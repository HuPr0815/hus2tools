<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Quicksand:wght@600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Quicksand:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "dark-jewel-purple": "#5b21b6",
            "clay-yellow-main": "#ffe6a7",
            "on-surface-variant": "#3f4943",
            "error": "#ba1a1a",
            "dark-jewel-green": "#065f46",
            "surface-tint": "#0e6c4a",
            "tertiary-fixed": "#ffd9dd",
            "on-secondary-fixed-variant": "#104a70",
            "clay-pink-deep": "#ff6a88",
            "on-surface": "#151c22",
            "clay-blue-light": "#cae9ff",
            "on-secondary-container": "#265a81",
            "surface-bright": "#f6f9ff",
            "surface-container-high": "#e2e9f1",
            "clay-yellow-light": "#fff4bd",
            "on-primary": "#ffffff",
            "clay-purple-dark": "#b377dc",
            "primary-fixed-dim": "#85d7ad",
            "on-secondary": "#ffffff",
            "on-error": "#ffffff",
            "clay-yellow-dark": "#ffcc77",
            "on-primary-fixed": "#002113",
            "surface-container-low": "#eef4fd",
            "surface-variant": "#dce3ec",
            "surface": "#f6f9ff",
            "on-background": "#151c22",
            "clay-blue-dark": "#5a9fd4",
            "dark-jewel-yellow": "#92400e",
            "surface-dim": "#d4dbe3",
            "clay-yellow-deep": "#d4a373",
            "clay-green-light": "#d8f3dc",
            "clay-green-deep": "#2d6a4f",
            "outline-variant": "#bec9c0",
            "clay-green-main": "#b7e4c7",
            "secondary": "#30628a",
            "dark-jewel-pink": "#9d2d6d",
            "clay-pink-main": "#ffb3d9",
            "clay-pink-dark": "#ff8fb3",
            "on-primary-fixed-variant": "#005236",
            "secondary-fixed": "#cde5ff",
            "inverse-on-surface": "#ebf1fa",
            "primary-fixed": "#a0f4c8",
            "surface-container-highest": "#dce3ec",
            "clay-purple-deep": "#7e5ca0",
            "tertiary-container": "#ff98a8",
            "tertiary-fixed-dim": "#ffb2bc",
            "secondary-fixed-dim": "#9bcbf8",
            "clay-purple-light": "#e4c1f9",
            "on-primary-container": "#005236",
            "clay-blue-main": "#a2d2ff",
            "tertiary": "#ad2c4d",
            "inverse-surface": "#2a3138",
            "outline": "#6f7a72",
            "clay-blue-deep": "#356590",
            "on-tertiary": "#ffffff",
            "primary-container": "#74c69d",
            "on-secondary-fixed": "#001d32",
            "background": "#f6f9ff"
          },
          "boxShadow": {
            "clay": "inset 0 2px 4px rgba(255,255,255,0.8), 0 4px 12px rgba(0,0,0,0.05), inset -2px -2px 6px rgba(0,0,0,0.02)",
            "clay-hover": "inset 0 4px 6px rgba(255,255,255,0.9), 0 8px 24px rgba(0,0,0,0.08), inset -3px -3px 8px rgba(0,0,0,0.03)",
            "clay-inset": "inset 3px 3px 6px rgba(0,0,0,0.08), inset -3px -3px 6px rgba(255,255,255,0.8)"
          },
          "spacing": {
            "unit": "4px",
            "gutter": "16px",
            "container-padding": "24px",
            "clay-padding-sm": "12px 16px",
            "stack-gap": "12px",
            "clay-padding-md": "20px 24px"
          },
          "fontFamily": {
            "tool-title": ["Inter"],
            "headline-md": ["Quicksand"],
            "body-lg": ["Inter"],
            "micro": ["Inter"],
            "display-hero": ["Quicksand"],
            "label-md": ["Inter"],
            "headline-lg": ["Quicksand"],
            "display-hero-mobile": ["Quicksand"],
            "body-sm": ["Inter"]
          }
        }
      }
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    
    .shadow-clay {
      box-shadow: inset 2px 2px 4px rgba(255,255,255,0.8), 6px 6px 12px rgba(0,0,0,0.05), -2px -2px 6px rgba(255,255,255,0.5);
    }
    
    .shadow-clay-hover {
      box-shadow: inset 3px 3px 6px rgba(255,255,255,0.9), 8px 8px 16px rgba(0,0,0,0.08), -3px -3px 8px rgba(255,255,255,0.6);
    }

    .shadow-clay-inset {
      box-shadow: inset 4px 4px 8px rgba(0,0,0,0.06), inset -4px -4px 8px rgba(255,255,255,0.9);
    }

    .spring-transition {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    body {
      background-color: #f6f9ff;
      overflow-x: hidden;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col font-body-lg text-on-background">
<!-- Top App Bar -->
<header class="flex justify-between items-center w-full sticky top-0 z-50 bg-surface dark:bg-surface-dim shadow-[inset_0_2px_4px_rgba(255,255,255,0.8),0_4px_12px_rgba(0,0,0,0.05)] px-container-padding py-stack-gap h-16">
<div class="flex items-center gap-3">
<div class="w-10 h-10 flex items-center justify-center bg-clay-green-main rounded-xl shadow-clay">
<span class="material-symbols-outlined text-primary" data-icon="handyman">handyman</span>
</div>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary dark:text-clay-green-dark">ClayTools</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full shadow-clay bg-surface-bright hover:scale-105 spring-transition active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="help_outline">help_outline</span>
</button>
</header>
<main class="flex-1 flex flex-col px-container-padding py-8 gap-8 max-w-lg mx-auto w-full">
<!-- Title & Mode Selector Section -->
<div class="flex flex-col gap-6 text-center">
<div class="space-y-1">
<h2 class="font-headline-lg text-headline-lg-mobile text-on-surface">Smart Formatter</h2>
<p class="font-body-sm text-on-surface-variant">Beautify and validate your code instantly.</p>
</div>
<!-- Mode Selector (Pill Layout) -->
<div class="flex bg-surface-container p-1 rounded-full shadow-clay-inset gap-1">
<button class="flex-1 py-3 rounded-full font-label-md text-label-md spring-transition bg-primary text-on-primary shadow-clay" id="mode-json" onclick="setMode('json')">JSON</button>
<button class="flex-1 py-3 rounded-full font-label-md text-label-md spring-transition text-on-surface-variant hover:bg-surface-bright" id="mode-markdown" onclick="setMode('markdown')">Markdown</button>
<button class="flex-1 py-3 rounded-full font-label-md text-label-md spring-transition text-on-surface-variant hover:bg-surface-bright" id="mode-html" onclick="setMode('html')">HTML</button>
</div>
</div>
<!-- Main Input Area (Claymorphic) -->
<div class="flex-1 flex flex-col relative group">
<div class="absolute inset-0 bg-clay-blue-light/20 blur-3xl -z-10 group-focus-within:bg-clay-green-light/30 spring-transition"></div>
<div class="flex-1 bg-surface shadow-clay-inset rounded-[32px] p-6 flex flex-col min-h-[300px]">
<div class="flex justify-between items-center mb-4">
<span class="font-label-md text-label-md text-primary bg-clay-green-light px-3 py-1 rounded-full">INPUT SOURCE</span>
<button class="text-on-surface-variant hover:text-primary spring-transition" title="Clear All">
<span class="material-symbols-outlined text-[20px]" data-icon="delete_sweep">delete_sweep</span>
</button>
</div>
<textarea class="flex-1 bg-transparent border-none focus:ring-0 font-mono text-body-sm text-on-surface placeholder:text-outline-variant resize-none" placeholder="Paste your unformatted code here..."></textarea>
<div class="mt-4 flex justify-end gap-3">
<button class="flex items-center gap-2 px-4 py-2 bg-surface-bright rounded-full shadow-clay font-label-md text-label-md text-secondary hover:scale-105 active:scale-95 spring-transition">
<span class="material-symbols-outlined text-[18px]" data-icon="content_paste">content_paste</span>
             Paste
           </button>
</div>
</div>
</div>
<!-- Stats/Context Chips -->
<div class="flex flex-wrap justify-center gap-3">
<div class="bg-clay-blue-light text-clay-blue-deep px-4 py-2 rounded-full font-label-md text-label-md shadow-clay flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="info">info</span>
        Auto-detect: ON
      </div>
<div class="bg-clay-yellow-light text-clay-yellow-deep px-4 py-2 rounded-full font-label-md text-label-md shadow-clay flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="speed">speed</span>
        Fast Mode
      </div>
</div>
<!-- Primary Action Area -->
<div class="pb-12 pt-4">
<button class="w-full h-20 bg-primary text-on-primary rounded-full font-headline-md text-headline-md-mobile flex items-center justify-center gap-3 shadow-clay hover:shadow-clay-hover hover:-translate-y-1 active:scale-95 spring-transition">
<span class="material-symbols-outlined text-[28px]" data-icon="auto_fix_high" style="font-variation-settings: 'FILL' 1;">auto_fix_high</span>
        Format Now
      </button>
</div>
</main>
<!-- Navigation Shell (Bottom Nav) -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-50 flex justify-around items-center px-4 bg-clay-blue-light dark:bg-clay-blue-deep rounded-full h-20 shadow-[0_8px_16px_rgba(162,210,255,0.4),inset_2px_2px_4px_rgba(255,255,255,0.9),inset_-2px_-2px_4px_rgba(53,101,144,0.2)]">
<!-- Tools (Active) -->
<div class="flex flex-col items-center justify-center bg-primary dark:bg-primary-fixed text-on-primary dark:text-on-primary-fixed rounded-full w-14 h-14 transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] shadow-clay-hover">
<span class="material-symbols-outlined" data-icon="construction" style="font-variation-settings: 'FILL' 1;">construction</span>
<span class="font-micro text-[8px] mt-0.5">Tools</span>
</div>
<!-- History -->
<div class="flex flex-col items-center justify-center text-secondary dark:text-clay-blue-light w-14 h-14 hover:translate-y-[-4px] transition-transform">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-micro text-[8px] mt-0.5">History</span>
</div>
<!-- Saved -->
<div class="flex flex-col items-center justify-center text-secondary dark:text-clay-blue-light w-14 h-14 hover:translate-y-[-4px] transition-transform">
<span class="material-symbols-outlined" data-icon="bookmark">bookmark</span>
<span class="font-micro text-[8px] mt-0.5">Saved</span>
</div>
<!-- Settings -->
<div class="flex flex-col items-center justify-center text-secondary dark:text-clay-blue-light w-14 h-14 hover:translate-y-[-4px] transition-transform">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-micro text-[8px] mt-0.5">Settings</span>
</div>
</nav>
<script>
    function setMode(mode) {
      const modes = ['json', 'markdown', 'html'];
      modes.forEach(m => {
        const btn = document.getElementById(`mode-${m}`);
        if (m === mode) {
          btn.classList.remove('text-on-surface-variant', 'hover:bg-surface-bright');
          btn.classList.add('bg-primary', 'text-on-primary', 'shadow-clay');
        } else {
          btn.classList.add('text-on-surface-variant', 'hover:bg-surface-bright');
          btn.classList.remove('bg-primary', 'text-on-primary', 'shadow-clay');
        }
      });
    }

    // Micro-interaction for the FAB-style main button
    const formatBtn = document.querySelector('button.bg-primary.h-20');
    formatBtn.addEventListener('click', () => {
      formatBtn.innerHTML = `
        <div class="flex items-center gap-3">
          <svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Formatting...</span>
        </div>
      `;
      setTimeout(() => {
        formatBtn.innerHTML = `
          <span class="material-symbols-outlined text-[28px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
          <span>Done!</span>
        `;
        formatBtn.classList.replace('bg-primary', 'bg-clay-green-deep');
        setTimeout(() => {
          formatBtn.innerHTML = `
            <span class="material-symbols-outlined text-[28px]" data-icon="auto_fix_high" style="font-variation-settings: 'FILL' 1;">auto_fix_high</span>
            <span>Format Now</span>
          `;
          formatBtn.classList.replace('bg-clay-green-deep', 'bg-primary');
        }, 2000);
      }, 1000);
    });
  </script>
</body></html>
