<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Crop Tool</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}
.container { max-width: 1600px; margin: 0 auto; }
.header { color: white; text-align: center; margin-bottom: 25px; }
.header h1 { font-size: 2.2rem; margin-bottom: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
.header p { opacity: 0.95; font-size: 1.1rem; }
.main {
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 25px;
    min-height: calc(100vh - 120px);
}
.panel {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
.panel.sidebar {
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
}
.panel.preview-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
}
.panel h2 {
    font-size: 1.25rem;
    color: #4a5568;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid #e2e8f0;
}
.upload-area { margin-bottom: 20px; }
.upload-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px;
    border: 3px dashed #e2e8f0;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    background: #f7fafc;
}
.upload-label:hover { border-color: #667eea; background: #eef5ff; }
.upload-icon { font-size: 42px; margin-bottom: 10px; }
.upload-text { font-size: 0.95rem; color: #4a5568; font-weight: 500; }
.upload-sub { font-size: 0.8rem; color: #94a3b8; margin-top: 6px; }
.upload-info {
    margin-top: 10px;
    padding: 10px;
    background: #dcfce7;
    border-radius: 8px;
    font-size: 0.85rem;
    color: #166534;
    display: none;
}
.upload-info .format-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    margin-left: 6px;
    vertical-align: middle;
}
.format-badge.svg { background: #fbbf24; color: #78350f; }
.format-badge.png { background: #34d399; color: #064e3b; }
.format-badge.jpg { background: #60a5fa; color: #1e3a5f; }
.format-badge.gif { background: #f472b6; color: #831843; }
.format-badge.webp { background: #a78bfa; color: #3b0764; }
.format-badge.bmp { background: #fb923c; color: #7c2d12; }
.format-badge.avif { background: #2dd4bf; color: #134e4a; }
.format-badge.ico { background: #f87171; color: #7f1d1d; }
.format-badge.tiff { background: #818cf8; color: #312e81; }
.format-badge.other { background: #94a3b8; color: #1e293b; }
.viewbox-info {
    padding: 12px;
    background: #fef3c7;
    border: 1px solid #fbbf24;
    border-radius: 8px;
    font-size: 0.85rem;
    color: #92400e;
    margin-bottom: 15px;
    display: none;
}
.viewbox-info code {
    background: #fde68a;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 0.8rem;
}
.tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: #f1f5f9;
    padding: 4px;
    border-radius: 10px;
}
.tab-btn {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: #64748b;
    transition: all 0.2s ease;
}
.tab-btn.active {
    background: white;
    color: #667eea;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.tab-btn:hover:not(.active) { color: #334155; }
.tab-btn.disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
}
.tab-content { display: none; }
.tab-content.active { display: block; }
.controls { display: flex; flex-direction: column; gap: 15px; }
.control-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.control-item { display: flex; flex-direction: column; }
.control-item label { font-weight: 600; color: #4a5568; margin-bottom: 6px; font-size: 0.9rem; }
.control-item input, .control-item select {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: monospace;
}
.control-item input:focus, .control-item select:focus { outline: none; border-color: #667eea; }
.output-format-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #f0f9ff;
    border: 1px solid #bae6fd;
    border-radius: 8px;
}
.output-format-row label { font-weight: 600; color: #4a5568; font-size: 0.9rem; white-space: nowrap; }
.output-format-row select {
    flex: 1;
    padding: 8px 10px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.9rem;
}
.output-format-row select:focus { outline: none; border-color: #667eea; }
.quality-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #f7fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
}
.quality-row label { font-weight: 600; color: #4a5568; font-size: 0.9rem; white-space: nowrap; }
.quality-row input[type="range"] { flex: 1; accent-color: #667eea; }
.quality-row .quality-val { font-size: 0.85rem; color: #667eea; font-weight: 600; min-width: 36px; text-align: right; }
.compress-options { display: flex; flex-direction: column; gap: 10px; }
.compress-option {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: #f7fafc; border-radius: 8px; border: 1px solid #e2e8f0;
}
.compress-option input[type="checkbox"] { width: 18px; height: 18px; accent-color: #667eea; }
.compress-option label { font-size: 0.9rem; color: #334155; cursor: pointer; font-weight: 500; }
.compress-notice {
    padding: 10px 12px;
    background: #fef3c7;
    border: 1px solid #fbbf24;
    border-radius: 8px;
    font-size: 0.85rem;
    color: #92400e;
    display: none;
    margin-bottom: 10px;
}
.compress-result {
    padding: 12px; background: #f0fdf4; border: 1px solid #86efac;
    border-radius: 8px; font-size: 0.85rem; color: #166534; display: none;
}
.compress-result .size-compare { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.compress-result .size-bar { flex: 1; height: 8px; background: #dcfce7; border-radius: 4px; overflow: hidden; }
.compress-result .size-bar-inner { height: 100%; background: #22c55e; border-radius: 4px; transition: width 0.3s ease; }
.sprite-detect-bar {
    display: flex; gap: 8px; align-items: flex-end; margin-bottom: 12px;
}
.sprite-detect-bar .detect-field { display: flex; flex-direction: column; flex: 1; }
.sprite-detect-bar .detect-field label { font-size: 0.8rem; font-weight: 600; color: #4a5568; margin-bottom: 4px; }
.sprite-detect-bar .detect-field input, .sprite-detect-bar .detect-field select {
    padding: 8px 10px; border: 2px solid #e2e8f0; border-radius: 8px;
    font-size: 0.9rem; font-family: monospace;
}
.sprite-detect-bar .detect-field input:focus, .sprite-detect-bar .detect-field select:focus { outline: none; border-color: #667eea; }
.sprite-detect-bar .detect-btn {
    padding: 8px 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white; border: none; border-radius: 8px; font-size: 0.85rem;
    font-weight: 600; cursor: pointer; white-space: nowrap;
}
.sprite-detect-bar .detect-btn:hover { opacity: 0.9; }
.sprite-list {
    display: flex; flex-direction: column; gap: 6px;
    max-height: 280px; overflow-y: auto;
}
.sprite-item {
    display: grid; grid-template-columns: auto auto auto 1fr auto;
    align-items: center; padding: 8px 10px;
    background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    cursor: pointer; transition: all 0.2s ease; gap: 8px;
}
.sprite-item:hover { border-color: #667eea; background: #eef5ff; }
.sprite-item.selected { border-color: #667eea; background: #eef5ff; box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2); }
.sprite-item-thumb {
    width: 40px; height: 40px; border-radius: 4px; overflow: hidden;
    background: repeating-conic-gradient(#e2e8f0 0% 25%, #fff 0% 50%) 50% / 10px 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sprite-item-thumb canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
.sprite-item-idx {
    width: 24px; height: 24px; background: #667eea; color: white;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700;
}
.sprite-item-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.sprite-item-name {
    font-weight: 600; font-size: 0.85rem; color: #334155;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sprite-item-name input {
    width: 100%; padding: 2px 6px; border: 1px solid #e2e8f0; border-radius: 4px;
    font-size: 0.85rem; font-weight: 600; font-family: inherit;
}
.sprite-item-name input:focus { outline: none; border-color: #667eea; }
.sprite-item-coords { font-size: 0.7rem; color: #64748b; font-family: monospace; }
.sprite-item-btns { display: flex; gap: 4px; }
.sprite-item-btn {
    padding: 3px 8px; border: none; border-radius: 5px;
    font-size: 0.7rem; cursor: pointer; font-weight: 600;
}
.sprite-item-btn.crop-btn { background: #667eea; color: white; }
.sprite-item-btn.crop-btn:hover { background: #5a6fd6; }
.sprite-item-btn.dl-btn { background: #10b981; color: white; }
.sprite-item-btn.dl-btn:hover { background: #059669; }
.sprite-item-btn.locate-btn { background: #667eea; color: white; }
.sprite-item-btn.locate-btn:hover { background: #5a6fd6; }
.sprite-item-btn.del-btn { background: #fee2e2; color: #dc2626; }
.sprite-item-btn.del-btn:hover { background: #fecaca; }
.sprite-item-btn.merge-btn { background: #f59e0b; color: white; }
.sprite-item-btn.merge-btn:hover { background: #d97706; }
.sprite-batch-bar {
    display: flex; gap: 6px; align-items: center; padding: 8px 0;
    border-bottom: 1px solid #e2e8f0; margin-bottom: 8px; flex-wrap: wrap;
}
.sprite-batch-bar .batch-info { font-size: 0.8rem; color: #64748b; margin-right: auto; }
.sprite-item.dragging { opacity: 0.4; border-style: dashed; }
.sprite-item.drag-over { border-color: #667eea; border-style: solid; box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.3); }
.sprite-item .drag-handle {
    cursor: grab; color: #cbd5e1; font-size: 1rem; padding: 0 2px; user-select: none;
}
.sprite-item .drag-handle:active { cursor: grabbing; }
.sprite-empty { text-align: center; padding: 20px; color: #94a3b8; font-size: 0.9rem; }
.sprite-add-form {
    padding: 12px; background: #f0f9ff; border: 1px solid #bae6fd;
    border-radius: 8px; margin-bottom: 10px; display: none;
}
.sprite-add-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.sprite-add-form .form-row:last-child { margin-bottom: 0; }
.sprite-add-form .form-field { display: flex; flex-direction: column; }
.sprite-add-form .form-field label { font-size: 0.75rem; font-weight: 600; color: #4a5568; margin-bottom: 3px; }
.sprite-add-form .form-field input {
    padding: 6px 8px; border: 1px solid #e2e8f0; border-radius: 6px;
    font-size: 0.85rem; font-family: monospace;
}
.sprite-add-form .form-field input:focus { outline: none; border-color: #667eea; }
.sprite-add-form .form-actions { display: flex; gap: 8px; margin-top: 8px; }
.sprite-add-form .form-actions button {
    flex: 1; padding: 7px 12px; border: none; border-radius: 6px;
    font-size: 0.8rem; font-weight: 600; cursor: pointer;
}
.sprite-css-output {
    margin-top: 12px; padding: 12px; background: #1e293b; color: #e2e8f0;
    border-radius: 8px; font-family: monospace; font-size: 0.8rem;
    white-space: pre-wrap; word-break: break-all;
    max-height: 180px; overflow-y: auto; display: none;
}
.buttons {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 20px; padding-top: 20px; border-top: 1px solid #e2e8f0;
}
.buttons button {
    width: 100%; padding: 13px 20px; border: none; border-radius: 10px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
}
.btn-row { display: flex; gap: 8px; }
.btn-row button { flex: 1; }
.btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
.btn-success:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }
.btn-secondary { background: #f7fafc; color: #4a5568; border: 2px solid #e2e8f0; }
.btn-secondary:hover { background: #edf2f7; }
.btn-purple { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); color: white; }
.btn-purple:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4); }
.btn-sm { padding: 8px 14px; font-size: 0.85rem; border-radius: 8px; }
.btn-orange { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
.btn-orange:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4); }
.ratio-presets { display: flex; gap: 6px; flex-wrap: wrap; }
.ratio-btn {
    padding: 5px 10px; border: 2px solid #e2e8f0; border-radius: 6px;
    font-size: 0.8rem; font-weight: 600; cursor: pointer; background: #f7fafc;
    color: #4a5568; transition: all 0.2s ease;
}
.ratio-btn:hover { border-color: #667eea; color: #667eea; }
.ratio-btn.active { background: #667eea; color: white; border-color: #667eea; }
.transform-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.transform-btn {
    padding: 6px 10px; border: 2px solid #e2e8f0; border-radius: 6px;
    font-size: 0.8rem; cursor: pointer; background: #f7fafc; color: #4a5568;
    transition: all 0.2s ease; font-weight: 500;
}
.transform-btn:hover { border-color: #667eea; color: #667eea; background: #eef5ff; }
.raster-compress-options { display: flex; flex-direction: column; gap: 12px; }
.raster-compress-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 8px;
}
.raster-compress-row label { font-weight: 600; color: #4a5568; font-size: 0.85rem; white-space: nowrap; min-width: 70px; }
.raster-compress-row input, .raster-compress-row select {
    flex: 1; padding: 8px 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem;
}
.raster-compress-row input:focus, .raster-compress-row select:focus { outline: none; border-color: #667eea; }
.raster-compress-row .unit { font-size: 0.8rem; color: #94a3b8; min-width: 24px; }
.compress-preview { margin-top: 12px; display: none; }
.compare-slider {
    position: relative; width: 100%; overflow: hidden; border-radius: 8px;
    border: 1px solid #e2e8f0; cursor: ew-resize; user-select: none;
    background: repeating-conic-gradient(#f1f5f9 0% 25%, #fff 0% 50%) 50% / 16px 16px;
}
.compare-slider img {
    display: block; width: 100%; height: auto; max-height: 200px; object-fit: contain;
    pointer-events: none;
}
.compare-slider .compare-orig {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    overflow: hidden; z-index: 1;
}
.compare-slider .compare-orig img { width: 100%; }
.compare-slider .compare-line {
    position: absolute; top: 0; bottom: 0; width: 3px;
    background: #667eea; z-index: 2; left: 50%;
    box-shadow: 0 0 6px rgba(102, 126, 234, 0.5);
}
.compare-slider .compare-handle {
    position: absolute; top: 50%; width: 28px; height: 28px;
    background: #667eea; border-radius: 50%; z-index: 3;
    left: calc(50% - 14px); transform: translateY(-50%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.compare-slider .compare-handle::after {
    content: '⟺'; color: white; font-size: 14px; font-weight: bold;
}
.compare-slider .compare-label {
    position: absolute; top: 6px; padding: 2px 8px; border-radius: 4px;
    font-size: 0.7rem; font-weight: 600; z-index: 4; pointer-events: none;
}
.compare-slider .compare-label-orig { left: 6px; background: rgba(102,126,234,0.8); color: white; }
.compare-slider .compare-label-comp { right: 6px; background: rgba(16,185,129,0.8); color: white; }
.crop-preview-box {
    border: 1px solid #e2e8f0;
    border-radius: 8px; overflow: hidden; background: #f0f4f8;
    display: none; margin-top: 10px;
}
.crop-preview-box .preview-label { font-size: 0.75rem; color: #64748b; text-align: center; padding: 4px; background: #f1f5f9; font-weight: 600; }
.crop-preview-box canvas { display: block; max-width: 100%; margin: 0 auto; }
.progress-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); display: none; z-index: 999;
    justify-content: center; align-items: center;
}
.progress-overlay.show { display: flex; }
.progress-box {
    background: white; border-radius: 16px; padding: 32px 40px;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.progress-box p { font-size: 1rem; color: #334155; margin-bottom: 16px; font-weight: 600; }
.progress-bar-track { width: 240px; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.2s ease; width: 0%; }
.preview-container {
    flex: 1; background: #1e293b; border-radius: 12px;
    overflow: hidden; position: relative; min-height: 500px;
}
.preview-container img { display: block; max-width: 100%; }
.preview-placeholder {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #64748b; font-size: 1.1rem; text-align: center; pointer-events: none;
}
.preview-placeholder span { font-size: 3rem; display: block; margin-bottom: 12px; }
.info-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 12px; padding: 10px 14px; background: #f1f5f9;
    border-radius: 8px; font-size: 0.85rem; color: #64748b; flex-wrap: wrap; gap: 8px;
}
.info-item { display: flex; align-items: center; gap: 6px; }
.info-item strong { color: #334155; font-weight: 600; }
.exif-panel {
    margin-top: 8px; padding: 10px 14px; background: #f8fafc;
    border-radius: 8px; font-size: 0.8rem; color: #64748b;
    display: none; border: 1px solid #e2e8f0;
}
.exif-panel.show { display: block; }
.exif-panel .exif-title { font-weight: 700; color: #334155; margin-bottom: 6px; cursor: pointer; user-select: none; }
.exif-panel .exif-title::before { content: '📷 '; }
.exif-panel .exif-title::after { content: ' ▾'; font-size: 0.7rem; }
.exif-panel .exif-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
.exif-panel .exif-field { display: flex; gap: 4px; }
.exif-panel .exif-label { color: #94a3b8; white-space: nowrap; }
.exif-panel .exif-value { color: #334155; font-weight: 500; word-break: break-all; }
.webp-frames-panel {
    margin-top: 8px; padding: 10px 14px; background: #f8fafc;
    border-radius: 8px; border: 1px solid #e2e8f0; display: none;
}
.webp-frames-panel.show { display: block; }
.webp-frames-panel .frames-title { font-weight: 700; color: #334155; margin-bottom: 8px; font-size: 0.9rem; }
.webp-frames-panel .frames-title::before { content: '🎬 '; }
.webp-frames-panel .frames-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px; max-height: 240px; overflow-y: auto;
}
.webp-frames-panel .frame-item {
    border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden;
    text-align: center; cursor: pointer; transition: border-color 0.2s;
    background: repeating-conic-gradient(#f1f5f9 0% 25%, #fff 0% 50%) 50% / 8px 8px;
}
.webp-frames-panel .frame-item:hover { border-color: #667eea; }
.webp-frames-panel .frame-item img { width: 100%; height: 60px; object-fit: contain; display: block; }
.webp-frames-panel .frame-item .frame-label { font-size: 0.65rem; color: #64748b; padding: 2px; }
.webp-frames-panel .frames-actions { margin-top: 8px; display: flex; gap: 6px; }
.toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.8); color: white; padding: 14px 24px;
    border-radius: 10px; font-size: 0.95rem; opacity: 0; visibility: hidden;
    transition: all 0.3s ease; z-index: 1000;
}
.toast.show { opacity: 1; visibility: visible; }
@media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .panel.sidebar { max-height: none; overflow-y: visible; }
    .preview-container { min-height: 400px; }
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Image Crop Tool</h1>
        <p>上传图片，框选裁剪区域，下载裁剪后的文件</p>
    </div>

    <div class="main">
        <div class="panel sidebar">
            <h2>上传图片文件</h2>
            <div class="upload-area">
                <input type="file" id="fileInput" accept=".svg,.png,.jpg,.jpeg,.gif,.webp,.bmp,.avif,.ico,.tiff,.tif,image/*" style="display: none;">
                <label for="fileInput" class="upload-label">
                    <span class="upload-icon">🖼️</span>
                    <span class="upload-text">点击上传图片文件</span>
                    <span class="upload-sub">支持 SVG / PNG / JPG / GIF / WebP / BMP / AVIF / ICO / TIFF</span>
                </label>
                <div class="upload-info" id="uploadInfo"></div>
            </div>

            <div class="viewbox-info" id="viewboxInfo">
                <span id="vbLabel">原始尺寸</span>: <code id="vbDisplay">-</code>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" data-tab="crop">✂️ 裁剪</button>
                <button class="tab-btn" data-tab="compress">📦 压缩</button>
                <button class="tab-btn" data-tab="sprite">🎯 精灵图</button>
            </div>

            <div class="tab-content active" id="tab-crop">
                <h2 id="cropParamTitle">裁剪参数 (像素坐标)</h2>
                <div class="controls">
                    <div class="control-group">
                        <div class="control-item">
                            <label>X 起点</label>
                            <input type="number" id="cropX" value="0" step="any">
                        </div>
                        <div class="control-item">
                            <label>Y 起点</label>
                            <input type="number" id="cropY" value="0" step="any">
                        </div>
                    </div>
                    <div class="control-group">
                        <div class="control-item">
                            <label>宽度</label>
                            <input type="number" id="cropW" value="0" step="any" min="1">
                        </div>
                        <div class="control-item">
                            <label>高度</label>
                            <input type="number" id="cropH" value="0" step="any" min="1">
                        </div>
                    </div>
                    <div class="output-format-row" id="outputFormatRow">
                        <label>输出格式</label>
                        <select id="outputFormat">
                            <option value="same">与原格式相同 (不支持则转PNG)</option>
                            <option value="png">PNG</option>
                            <option value="jpeg">JPEG</option>
                            <option value="webp">WebP</option>
                            <option value="svg">SVG (仅嵌入)</option>
                        </select>
                    </div>
                    <div class="quality-row" id="qualityRow" style="display:none;">
                        <label>质量</label>
                        <input type="range" id="outputQuality" min="10" max="100" value="92" step="1">
                        <span class="quality-val" id="qualityVal">92%</span>
                    </div>
                    <div id="rasterCropExtras" style="display:none;">
                        <div style="margin-bottom:8px;">
                            <label style="font-weight:600;color:#4a5568;font-size:0.9rem;display:block;margin-bottom:6px;">宽高比</label>
                            <div class="ratio-presets">
                                <button class="ratio-btn active" data-ratio="free">自由</button>
                                <button class="ratio-btn" data-ratio="1:1">1:1</button>
                                <button class="ratio-btn" data-ratio="4:3">4:3</button>
                                <button class="ratio-btn" data-ratio="3:4">3:4</button>
                                <button class="ratio-btn" data-ratio="16:9">16:9</button>
                                <button class="ratio-btn" data-ratio="9:16">9:16</button>
                                <button class="ratio-btn" data-ratio="2:1">2:1</button>
                                <button class="ratio-btn" data-ratio="reset" title="重置宽高比和变换">🔄</button>
                            </div>
                        </div>
                        <div>
                            <label style="font-weight:600;color:#4a5568;font-size:0.9rem;display:block;margin-bottom:6px;">变换</label>
                            <div class="transform-btns">
                                <button class="transform-btn" data-action="rotate-left" title="逆时针旋转90°">↺ 左旋</button>
                                <button class="transform-btn" data-action="rotate-right" title="顺时针旋转90°">↻ 右旋</button>
                                <button class="transform-btn" data-action="flip-h" title="水平翻转">↔ 水平翻转</button>
                                <button class="transform-btn" data-action="flip-v" title="垂直翻转">↕ 垂直翻转</button>
                            </div>
                        </div>
                    </div>
                    <div class="crop-preview-box" id="cropPreviewBox">
                        <div class="preview-label">裁剪预览</div>
                        <canvas id="cropPreviewCanvas"></canvas>
                    </div>
                </div>
                <div class="buttons">
                    <button class="btn-success" id="downloadBtn">⬇️ 下载裁剪后的图片</button>
                    <button class="btn-secondary" id="resetBtn">🔄 重置为全图</button>
                </div>
            </div>

            <div class="tab-content" id="tab-compress">
                <div id="svgCompressSection">
                    <h2>SVG 压缩优化</h2>
                    <div class="compress-options" id="compressOptions">
                        <div class="compress-option">
                            <input type="checkbox" id="optComments" checked>
                            <label for="optComments">移除注释</label>
                        </div>
                        <div class="compress-option">
                            <input type="checkbox" id="optMetadata" checked>
                            <label for="optMetadata">移除元数据</label>
                        </div>
                        <div class="compress-option">
                            <input type="checkbox" id="optTitle" checked>
                            <label for="optTitle">移除 title/desc</label>
                        </div>
                        <div class="compress-option">
                            <input type="checkbox" id="optEmptyAttrs" checked>
                            <label for="optEmptyAttrs">移除空属性</label>
                        </div>
                        <div class="compress-option">
                            <input type="checkbox" id="optCleanupNum" checked>
                            <label for="optCleanupNum">优化数值精度</label>
                        </div>
                        <div class="compress-option">
                            <input type="checkbox" id="optCollapseGroups" checked>
                            <label for="optCollapseGroups">合并冗余分组</label>
                        </div>
                        <div class="compress-option">
                            <input type="checkbox" id="optConvertPath" checked>
                            <label for="optConvertPath">优化路径数据</label>
                        </div>
                        <div class="compress-option">
                            <input type="checkbox" id="optRemoveEditor" checked>
                            <label for="optRemoveEditor">移除编辑器数据</label>
                        </div>
                    </div>
                    <div class="compress-result" id="compressResult">
                        <div>原始: <strong id="origSize">-</strong> → 压缩后: <strong id="compSize">-</strong></div>
                        <div>节省: <strong id="savedPct">-</strong></div>
                        <div class="size-compare">
                            <div class="size-bar"><div class="size-bar-inner" id="sizeBarInner"></div></div>
                        </div>
                    </div>
                    <div class="buttons">
                        <button class="btn-purple" id="compressBtn">📦 压缩并下载</button>
                    </div>
                </div>

                <div id="rasterCompressSection" style="display:none;">
                    <h2>图片压缩优化</h2>
                    <div class="raster-compress-options">
                        <div class="raster-compress-row">
                            <label>输出格式</label>
                            <select id="compFormat">
                                <option value="webp">WebP (推荐，体积最小)</option>
                                <option value="same">与原格式相同</option>
                                <option value="png">PNG (无损，仅缩尺寸有效)</option>
                                <option value="jpeg">JPEG (有损，适合照片)</option>
                            </select>
                        </div>
                        <div class="raster-compress-row" id="qualityRow">
                            <label>质量</label>
                            <input type="range" id="compQuality" min="10" max="100" value="80" step="1" style="flex:1;accent-color:#8b5cf6;">
                            <span id="compQualityVal" style="font-size:0.85rem;color:#8b5cf6;font-weight:600;min-width:36px;text-align:right;">80%</span>
                        </div>
                        <div class="raster-compress-row" id="estimateRow" style="display:none;">
                            <label>预估大小</label>
                            <span id="estimatedSize" style="font-size:0.85rem;color:#8b5cf6;font-weight:600;">-</span>
                        </div>
                        <div class="raster-compress-row">
                            <label>目标大小</label>
                            <input type="number" id="compMaxSize" placeholder="不限" min="1" step="1">
                            <span class="unit">KB</span>
                        </div>
                        <div class="raster-compress-row">
                            <label>最大宽度</label>
                            <input type="number" id="compMaxWidth" placeholder="不限" min="1" step="1">
                            <span class="unit">px</span>
                        </div>
                        <div class="raster-compress-row">
                            <label>最大高度</label>
                            <input type="number" id="compMaxHeight" placeholder="不限" min="1" step="1">
                            <span class="unit">px</span>
                        </div>
                    </div>
                    <div class="compress-result" id="rasterCompressResult">
                        <div>原始: <strong id="rOrigSize">-</strong> → 压缩后: <strong id="rCompSize">-</strong></div>
                        <div>节省: <strong id="rSavedPct">-</strong></div>
                        <div class="size-compare">
                            <div class="size-bar"><div class="size-bar-inner" id="rSizeBarInner"></div></div>
                        </div>
                    </div>
                    <div class="compress-preview" id="compressPreview">
                        <div class="compare-slider" id="compareSlider">
                            <img id="previewCompImg" alt="压缩后">
                            <div class="compare-orig" id="compareOrig">
                                <img id="previewOrigImg" alt="原图">
                            </div>
                            <div class="compare-line" id="compareLine"></div>
                            <div class="compare-handle" id="compareHandle"></div>
                            <span class="compare-label compare-label-orig">原图</span>
                            <span class="compare-label compare-label-comp">压缩后</span>
                        </div>
                    </div>
                    <div class="buttons">
                        <button class="btn-purple" id="rasterCompressBtn">📦 压缩并下载</button>
                        <button class="btn-secondary btn-sm" id="multiFormatBtn">📊 多格式对比导出</button>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="tab-sprite">
                <h2>精灵图辅助定位</h2>

                <div class="sprite-detect-bar">
                    <div class="detect-field">
                        <label>物品数量</label>
                        <input type="number" id="spriteCount" value="5" min="1" max="50" step="1">
                    </div>
                    <div class="detect-field">
                        <label>排列方式</label>
                        <select id="spriteLayout">
                            <option value="auto">自动判断</option>
                            <option value="horizontal">横向排列</option>
                            <option value="vertical">纵向排列</option>
                            <option value="grid">网格排列</option>
                            <option value="pixel" id="pixelDetectOption">像素检测 (透明间隙)</option>
                            <option value="dom">DOM 结构 (仅SVG)</option>
                        </select>
                    </div>
                    <button class="detect-btn" id="detectSpriteBtn">🔍 检测</button>
                </div>

                <div class="sprite-add-form" id="spriteAddForm">
                    <div class="form-row">
                        <div class="form-field">
                            <label>名称</label>
                            <input type="text" id="addName" placeholder="sprite_01">
                        </div>
                        <div class="form-field">
                            <label>X 起点</label>
                            <input type="number" id="addX" value="0" step="any">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-field">
                            <label>Y 起点</label>
                            <input type="number" id="addY" value="0" step="any">
                        </div>
                        <div class="form-field">
                            <label>宽度</label>
                            <input type="number" id="addW" value="0" step="any" min="1">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-field">
                            <label>高度</label>
                            <input type="number" id="addH" value="0" step="any" min="1">
                        </div>
                        <div class="form-field"></div>
                    </div>
                    <div class="form-actions">
                        <button class="btn-purple btn-sm" id="addConfirmBtn">✅ 添加</button>
                        <button class="btn-secondary btn-sm" id="addCancelBtn">取消</button>
                    </div>
                </div>

                <div class="sprite-list" id="spriteList">
                    <div class="sprite-empty">请先上传图片文件</div>
                </div>
                <div class="sprite-css-output" id="spriteCssOutput"></div>
                <div class="buttons">
                    <button class="btn-purple" id="copyCssBtn">📋 复制 CSS 代码</button>
                    <button class="btn-orange" id="exportSheetBtn" style="display:none;">🗺️ 导出精灵图合图</button>
                    <button class="btn-success" id="batchDownloadBtn" style="display:none;">⬇️ 批量下载全部</button>
                    <div class="btn-row">
                        <button class="btn-secondary btn-sm" id="addRegionBtn">➕ 自定义区域</button>
                        <button class="btn-secondary btn-sm" id="clearAllBtn">🗑️ 清空全部</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel preview-panel">
            <h2>裁剪预览</h2>
            <div class="preview-container" id="previewContainer">
                <div class="preview-placeholder" id="placeholder">
                    <span>🖼️</span>
                    请先上传图片文件
                </div>
                <img id="cropImage">
            </div>
            <div class="info-bar">
                <div class="info-item">
                    <span>原始尺寸:</span>
                    <strong id="originalSize">-</strong>
                </div>
                <div class="info-item">
                    <span>格式:</span>
                    <strong id="formatInfo">-</strong>
                </div>
                <div class="info-item">
                    <span>缩放:</span>
                    <strong id="zoomInfo">-</strong>
                </div>
                <div class="info-item">
                    <span>裁剪区域:</span>
                    <strong id="cropInfo">-</strong>
                </div>
            </div>
            <div class="exif-panel" id="exifPanel">
                <div class="exif-title" id="exifTitle">图片信息</div>
                <div class="exif-grid" id="exifGrid"></div>
            </div>
            <div class="webp-frames-panel" id="webpFramesPanel">
                <div class="frames-title" id="webpFramesTitle">动画帧</div>
                <div class="frames-grid" id="webpFramesGrid"></div>
                <div class="frames-actions">
                    <button class="btn-secondary btn-sm" id="downloadAllFramesBtn">⬇ 下载全部帧</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<div class="progress-overlay" id="progressOverlay">
    <div class="progress-box">
        <p id="progressText">处理中...</p>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script type="module">
import { optimize } from 'https://esm.sh/svgo@3.3.2';
window.svgoOptimize = optimize;
</script>
<script>
(function() {
    var cropImage = document.getElementById('cropImage');
    var fileInput = document.getElementById('fileInput');
    var uploadInfo = document.getElementById('uploadInfo');
    var placeholder = document.getElementById('placeholder');
    var cropXInput = document.getElementById('cropX');
    var cropYInput = document.getElementById('cropY');
    var cropWInput = document.getElementById('cropW');
    var cropHInput = document.getElementById('cropH');
    var viewboxInfo = document.getElementById('viewboxInfo');
    var vbDisplay = document.getElementById('vbDisplay');
    var vbLabel = document.getElementById('vbLabel');
    var originalSizeEl = document.getElementById('originalSize');
    var formatInfoEl = document.getElementById('formatInfo');
    var zoomInfoEl = document.getElementById('zoomInfo');
    var cropInfoEl = document.getElementById('cropInfo');
    var toast = document.getElementById('toast');
    var spriteList = document.getElementById('spriteList');
    var spriteCssOutput = document.getElementById('spriteCssOutput');
    var spriteAddForm = document.getElementById('spriteAddForm');
    var outputFormatRow = document.getElementById('outputFormatRow');
    var outputFormatSelect = document.getElementById('outputFormat');
    var qualityRow = document.getElementById('qualityRow');
    var outputQuality = document.getElementById('outputQuality');
    var qualityVal = document.getElementById('qualityVal');
    var cropParamTitle = document.getElementById('cropParamTitle');
    var rasterCropExtras = document.getElementById('rasterCropExtras');
    var svgCompressSection = document.getElementById('svgCompressSection');
    var rasterCompressSection = document.getElementById('rasterCompressSection');
    var exportSheetBtn = document.getElementById('exportSheetBtn');
    var progressOverlay = document.getElementById('progressOverlay');
    var progressText = document.getElementById('progressText');
    var progressBarFill = document.getElementById('progressBarFill');
    var cropPreviewBox = document.getElementById('cropPreviewBox');
    var cropPreviewCanvas = document.getElementById('cropPreviewCanvas');

    var svgText = null;
    var currentFileName = 'image.png';
    var currentFormat = null;
    var currentBlobUrl = null;
    var rasterDataUrl = null;
    var rasterImageEl = null;
    var originalFile = null;
    var cropper = null;
    var vbX = 0, vbY = 0, vbW = 0, vbH = 0;
    var naturalW = 0, naturalH = 0;
    var isUpdatingFromCropper = false;
    var isUpdatingFromInput = false;
    var spriteRegions = [];
    var regionCounter = 0;
    var activeSpriteIdx = -1;
    var currentRotation = 0;
    var currentScaleX = 1;
    var currentScaleY = 1;
    var cropPreviewRAF = null;
    var undoStack = [];
    var redoStack = [];
    var maxUndoSteps = 30;
    var isUndoRedoAction = false;

    var FORMAT_MAP = {
        'image/svg+xml': 'svg',
        'image/png': 'png',
        'image/jpeg': 'jpg',
        'image/gif': 'gif',
        'image/webp': 'webp',
        'image/bmp': 'bmp',
        'image/x-ms-bmp': 'bmp',
        'image/avif': 'avif',
        'image/x-icon': 'ico',
        'image/vnd.microsoft.icon': 'ico',
        'image/tiff': 'tiff',
        'image/x-tiff': 'tiff'
    };

    var EXT_MAP = {
        'svg': 'svg',
        'png': 'png',
        'jpg': 'jpg',
        'jpeg': 'jpg',
        'gif': 'gif',
        'webp': 'webp',
        'bmp': 'bmp',
        'avif': 'avif',
        'ico': 'ico',
        'tiff': 'tiff',
        'tif': 'tiff'
    };

    function detectFormat(file) {
        if (file.type && FORMAT_MAP[file.type]) return FORMAT_MAP[file.type];
        var ext = file.name.split('.').pop().toLowerCase();
        if (EXT_MAP[ext]) return EXT_MAP[ext];
        return null;
    }

    function isSvg(fmt) { return fmt === 'svg'; }
    function isRaster(fmt) { return fmt && fmt !== 'svg'; }

    function getMimeType(fmt) {
        var map = {
            'svg': 'image/svg+xml',
            'png': 'image/png',
            'jpg': 'image/jpeg',
            'jpeg': 'image/jpeg',
            'gif': 'image/gif',
            'webp': 'image/webp',
            'bmp': 'image/bmp',
            'avif': 'image/avif',
            'ico': 'image/x-icon',
            'tiff': 'image/tiff'
        };
        return map[fmt] || 'image/png';
    }

    function getExt(fmt) {
        var map = { 'jpg': 'jpg', 'jpeg': 'jpg', 'tiff': 'tiff' };
        return map[fmt] || fmt;
    }

    function syncActiveSpriteRegion(x, y, w, h) {
        if (activeSpriteIdx < 0 || activeSpriteIdx >= spriteRegions.length) return;
        spriteRegions[activeSpriteIdx].x = x;
        spriteRegions[activeSpriteIdx].y = y;
        spriteRegions[activeSpriteIdx].w = w;
        spriteRegions[activeSpriteIdx].h = h;
        var item = spriteList.querySelector('.sprite-item[data-idx="' + activeSpriteIdx + '"]');
        if (item) {
            var coordsEl = item.querySelector('.sprite-item-coords');
            if (coordsEl) { coordsEl.textContent = r(x) + ', ' + r(y) + ' | ' + r(w) + ' x ' + r(h); }
        }
        updateCssOutput();
    }

    function updateZoomDisplay() {
        if (!cropper) return;
        try {
            var imgData = cropper.getImageData();
            if (imgData && imgData.naturalWidth && imgData.width) {
                var scale = imgData.width / imgData.naturalWidth;
                zoomInfoEl.textContent = (scale * 100).toFixed(0) + '%';
            } else {
                zoomInfoEl.textContent = '-';
            }
        } catch (e) {
            zoomInfoEl.textContent = '-';
        }
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 2500);
    }

    function r(val) {
        return Math.round(val * 100) / 100;
    }

    function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function parseViewBox(text) {
        var match = text.match(/viewBox\s*=\s*"([^"]*)"/);
        if (match) {
            var parts = match[1].trim().split(/[\s,]+/);
            if (parts.length >= 4) {
                return { x: parseFloat(parts[0]), y: parseFloat(parts[1]), w: parseFloat(parts[2]), h: parseFloat(parts[3]) };
            }
        }
        return null;
    }

    function pixelToViewBox(px, py, pw, ph) {
        var scaleX = vbW / naturalW;
        var scaleY = vbH / naturalH;
        return { x: vbX + px * scaleX, y: vbY + py * scaleY, w: pw * scaleX, h: ph * scaleY };
    }

    function viewBoxToPixel(vx, vy, vw, vh) {
        var scaleX = naturalW / vbW;
        var scaleY = naturalH / vbH;
        return { x: (vx - vbX) * scaleX, y: (vy - vbY) * scaleY, w: vw * scaleX, h: vh * scaleY };
    }

    function buildCroppedSvg(text, x, y, w, h) {
        var gtPos = text.indexOf('>');
        if (gtPos === -1) return text;
        var openTag = text.substring(0, gtPos);
        var rest = text.substring(gtPos);
        openTag = openTag.replace(/\s+viewBox\s*=\s*"[^"]*"/i, '');
        openTag = openTag.replace(/\s+width\s*=\s*"[^"]*"/i, '');
        openTag = openTag.replace(/\s+height\s*=\s*"[^"]*"/i, '');
        openTag += ' viewBox="' + r(x) + ' ' + r(y) + ' ' + r(w) + ' ' + r(h) + '"';
        openTag += ' width="' + r(w) + '"';
        openTag += ' height="' + r(h) + '"';
        return openTag + rest;
    }

    function updateCropInfo() {

    function estimateCompressSize() {
        if (!rasterImageEl) { document.getElementById('estimateRow').style.display = 'none'; return; }
        var compFmt = document.getElementById('compFormat').value;
        var targetFmt = compFmt === 'same' ? currentFormat : compFmt;

        if (targetFmt === 'png') { document.getElementById('estimateRow').style.display = 'none'; return; }

        document.getElementById('estimateRow').style.display = '';
        document.getElementById('estimatedSize').textContent = '计算中...';

        if (estimateTimer) clearTimeout(estimateTimer);
        estimateTimer = setTimeout(function() {
            var quality = parseInt(document.getElementById('compQuality').value) / 100;
            var maxWidth = parseInt(document.getElementById('compMaxWidth').value) || 0;
            var maxHeight = parseInt(document.getElementById('compMaxHeight').value) || 0;
            var w = rasterImageEl.naturalWidth;
            var h = rasterImageEl.naturalHeight;
            if (maxWidth > 0 && w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
            if (maxHeight > 0 && h > maxHeight) { w = Math.round(w * maxHeight / h); h = maxHeight; }
            w = Math.max(1, w); h = Math.max(1, h);

            var canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            var ctx = canvas.getContext('2d');
            if (targetFmt === 'jpg') { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h); }
            ctx.drawImage(rasterImageEl, 0, 0, w, h);
            canvas.toBlob(function(blob) {
                if (blob) {
                    document.getElementById('estimatedSize').textContent = formatBytes(blob.size);

                }
            }, getMimeType(targetFmt), quality);
        }, 300);

    var webpFrames = [];

    function extractWebPFrames(file) {
        var panel = document.getElementById('webpFramesPanel');
        panel.classList.remove('show');
        webpFrames = [];

        if (currentFormat !== 'webp') return;

        var reader = new FileReader();
        reader.onload = function(e) {
            var data = new Uint8Array(e.target.result);
            if (!checkWebPAnimated(data)) return;

            var anmfChunks = collectANMFChunks(data);
            if (anmfChunks.length === 0) return;

            var canvasW = 0, canvasH = 0;
            var offset = 12;
            while (offset < data.length - 8) {
                var cid = String.fromCharCode(data[offset], data[offset+1], data[offset+2], data[offset+3]);
                var csz = data[offset+4] | (data[offset+5]<<8) | (data[offset+6]<<16) | (data[offset+7]<<24);
                if (cid === 'VP8 ') {
                    var d = parseVP8Dims(data.slice(offset+8, offset+8+csz));
                    if (d) { canvasW = d.w; canvasH = d.h; }
                }
                if (cid === 'VP8L') {
                    var d2 = parseVP8LDims(data.slice(offset+8, offset+8+csz));
                    if (d2) { canvasW = d2.w; canvasH = d2.h; }
                }
                offset += 8 + csz + (csz % 2);
                if (csz === 0) break;
            }

            var promises = anmfChunks.map(function(chunk) {
                return renderANMFFrame(chunk, canvasW, canvasH);
            });

            Promise.all(promises).then(function(results) {
                var frames = results.filter(function(f) { return f !== null; });
                if (frames.length === 0) return;
                webpFrames = frames;
                var title = document.getElementById('webpFramesTitle');
                title.textContent = '动画帧 (' + frames.length + '帧)';
                panel.classList.add('show');
                var grid = document.getElementById('webpFramesGrid');
                var html = '';
                for (var i = 0; i < frames.length; i++) {
                    html += '<div class="frame-item" data-frame="' + i + '">';
                    html += '<img src="' + frames[i].dataUrl + '">';
                    html += '<div class="frame-label">帧 ' + (i + 1) + '</div>';
                    html += '</div>';
                }
                grid.innerHTML = html;
                grid.querySelectorAll('.frame-item').forEach(function(item) {
                    item.addEventListener('click', function() {
                        var idx = parseInt(item.getAttribute('data-frame'));
                        var a = document.createElement('a');
                        a.href = webpFrames[idx].dataUrl;
                        a.download = currentFileName.replace(/\.webp$/i, '') + '_frame_' + (idx + 1) + '.png';
                        a.click();
                    });
                });
            });
        };
        reader.readAsArrayBuffer(file);
    }

    function checkWebPAnimated(data) {
        if (data.length < 20) return false;
        if (data[0] !== 0x52 || data[1] !== 0x49 || data[2] !== 0x46 || data[3] !== 0x46) return false;
        if (data[8] !== 0x57 || data[9] !== 0x45 || data[10] !== 0x42 || data[11] !== 0x50) return false;
        var offset = 12;
        while (offset < data.length - 8) {
            var chunkId = String.fromCharCode(data[offset], data[offset+1], data[offset+2], data[offset+3]);
            var chunkSize = data[offset+4] | (data[offset+5]<<8) | (data[offset+6]<<16) | (data[offset+7]<<24);
            if (chunkId === 'ANIM') return true;
            offset += 8 + chunkSize + (chunkSize % 2);
            if (chunkSize === 0) break;
        }
        return false;
    }

    function collectANMFChunks(data) {
        var chunks = [];
        var offset = 12;
        while (offset < data.length - 8) {
            var chunkId = String.fromCharCode(data[offset], data[offset+1], data[offset+2], data[offset+3]);
            var chunkSize = data[offset+4] | (data[offset+5]<<8) | (data[offset+6]<<16) | (data[offset+7]<<24);
            if (chunkId === 'ANMF') {
                chunks.push(data.slice(offset + 8, offset + 8 + chunkSize));
            }
            offset += 8 + chunkSize + (chunkSize % 2);
            if (chunkSize === 0) break;
        }
        return chunks;
    }

    function renderANMFFrame(frameData, canvasW, canvasH) {
        return new Promise(function(resolve) {
            try {
                var fx = (frameData[0] | (frameData[1] << 8) | (frameData[2] << 16)) & 0xFFFFFF;
                var fy = (frameData[3] | (frameData[4] << 8) | (frameData[5] << 16)) & 0xFFFFFF;
                var fw = ((frameData[6] | (frameData[7] << 8) | (frameData[8] << 16)) & 0xFFFFFF) + 1;
                var fh = ((frameData[9] | (frameData[10] << 8) | (frameData[11] << 16)) & 0xFFFFFF) + 1;

                var subOffset = 16;
                var subChunkId = '';
                if (subOffset + 8 <= frameData.length) {
                    subChunkId = String.fromCharCode(frameData[subOffset], frameData[subOffset+1], frameData[subOffset+2], frameData[subOffset+3]);
                }

                var frameBlob;
                if (subChunkId === 'VP8 ' || subChunkId === 'VP8L') {
                    var subSize = frameData[subOffset+4] | (frameData[subOffset+5]<<8) | (frameData[subOffset+6]<<16) | (frameData[subOffset+7]<<24);
                    var paddedSize = subSize + (subSize % 2);
                    var riffBuf = new Uint8Array(12 + 8 + paddedSize);
                    riffBuf[0]=0x52; riffBuf[1]=0x49; riffBuf[2]=0x46; riffBuf[3]=0x46;
                    var totalSize = 8 + paddedSize;
                    riffBuf[4]=totalSize&0xFF; riffBuf[5]=(totalSize>>8)&0xFF; riffBuf[6]=(totalSize>>16)&0xFF; riffBuf[7]=(totalSize>>24)&0xFF;
                    riffBuf[8]=0x57; riffBuf[9]=0x45; riffBuf[10]=0x42; riffBuf[11]=0x50;
                    for (var i = 0; i < 8; i++) riffBuf[12+i] = frameData[subOffset+i];
                    var pixelStart = subOffset + 8;
                    for (var i = 0; i < subSize; i++) riffBuf[20+i] = frameData[pixelStart+i];
                    frameBlob = new Blob([riffBuf], { type: 'image/webp' });
                } else {
                    frameBlob = new Blob([frameData], { type: 'image/webp' });
                }

                var url = URL.createObjectURL(frameBlob);
                var img = new Image();
                img.onload = function() {
                    var c = document.createElement('canvas');
                    c.width = fw; c.height = fh;
                    var ctx = c.getContext('2d');
                    ctx.drawImage(img, 0, 0, fw, fh);
                    resolve({ dataUrl: c.toDataURL('image/png'), x: fx, y: fy, w: fw, h: fh });
                    URL.revokeObjectURL(url);
                };
                img.onerror = function() {
                    resolve(null);
                    URL.revokeObjectURL(url);
                };
                img.src = url;
            } catch(e) { resolve(null); }
        });
    }

    function parseVP8Dims(vp8) {
        try {
            if (vp8.length < 10) return null;
            if (vp8[3] !== 0x9D || vp8[4] !== 0x01 || vp8[5] !== 0x2A) return null;
            var w = vp8[6] | ((vp8[7] & 0x3F) << 8);
            var h = (vp8[7] >> 6) | (vp8[8] << 2) | ((vp8[9] & 0x3F) << 10);
            return { w: w, h: h };
        } catch(e) { return null; }
    }

    function parseVP8LDims(vp8l) {
        try {
            if (vp8l.length < 5) return null;
            if (vp8l[0] !== 0x2F) return null;
            var b = vp8l[1] | (vp8l[2] << 8) | (vp8l[3] << 16) | (vp8l[4] << 24);
            var w = (b & 0x3FFF) + 1;
            var h = ((b >> 14) & 0x3FFF) + 1;
            return { w: w, h: h };
        } catch(e) { return null; }
    }

    function readExifData(file) {
        var exifPanel = document.getElementById('exifPanel');
        var exifGrid = document.getElementById('exifGrid');
        var exifTitle = document.getElementById('exifTitle');
        exifPanel.classList.remove('show');

        var fields = [];
        fields.push({ label: '文件名', value: file.name });
        fields.push({ label: '大小', value: formatBytes(file.size) });
        fields.push({ label: '类型', value: file.type || '未知' });
        fields.push({ label: '修改时间', value: file.lastModifiedDate ? file.lastModifiedDate.toLocaleString() : '-' });

        if (rasterImageEl) {
            fields.push({ label: '宽度', value: rasterImageEl.naturalWidth + 'px' });
            fields.push({ label: '高度', value: rasterImageEl.naturalHeight + 'px' });
            var mp = (rasterImageEl.naturalWidth * rasterImageEl.naturalHeight / 1000000).toFixed(2);
            fields.push({ label: '像素', value: mp + 'MP' });
        }

        if (file.type === 'image/jpeg' || file.name.toLowerCase().endsWith('.jpg') || file.name.toLowerCase().endsWith('.jpeg')) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var data = new Uint8Array(e.target.result);
                var exif = parseExif(data);
                if (exif) {
                    if (exif.Make) fields.push({ label: '相机', value: (exif.Make || '') + ' ' + (exif.Model || '') });
                    if (exif.DateTime) fields.push({ label: '拍摄时间', value: exif.DateTime });
                    if (exif.ExposureTime) fields.push({ label: '快门', value: '1/' + Math.round(1 / exif.ExposureTime) + 's' });
                    if (exif.FNumber) fields.push({ label: '光圈', value: 'f/' + exif.FNumber.toFixed(1) });
                    if (exif.ISO) fields.push({ label: 'ISO', value: exif.ISO });
                    if (exif.FocalLength) fields.push({ label: '焦距', value: exif.FocalLength + 'mm' });
                    if (exif.Software) fields.push({ label: '软件', value: exif.Software });
                    if (exif.Orientation) fields.push({ label: '方向', value: exif.Orientation });
                }
                renderExifFields(fields);
            };
            reader.readAsArrayBuffer(file.slice(0, 65536));
        } else {
            renderExifFields(fields);
        }

    function renderExifFields(fields) {
        var exifPanel = document.getElementById('exifPanel');
        var exifGrid = document.getElementById('exifGrid');
        var exifTitle = document.getElementById('exifTitle');

        if (fields.length === 0) return;
        exifPanel.classList.add('show');

        var html = '';
        for (var i = 0; i < fields.length; i++) {
            html += '<div class="exif-field"><span class="exif-label">' + fields[i].label + ':</span><span class="exif-value">' + fields[i].value + '</span></div>';
        }
        exifGrid.innerHTML = html;

        var expanded = true;
        exifTitle.onclick = function() {
            expanded = !expanded;
            exifGrid.style.display = expanded ? '' : 'none';
        };
    }

    function parseExif(data) {
        try {
            if (data[0] !== 0xFF || data[1] !== 0xD8) return null;
            var offset = 2;
            while (offset < data.length - 1) {
                if (data[offset] !== 0xFF) break;
                var marker = data[offset + 1];
                if (marker === 0xE1) {
                    return parseExifAPP1(data, offset + 4);
                }
                var len = (data[offset + 2] << 8) | data[offset + 3];
                offset += 2 + len;
            }
        } catch (e) {}
        return null;
    }

    function parseExifAPP1(data, offset) {
        if (data[offset] !== 0x45 || data[offset + 1] !== 0x78 || data[offset + 2] !== 0x69 || data[offset + 3] !== 0x66) return null;
        offset += 6;
        var byteOrder = (data[offset] << 8) | data[offset + 1];
        var littleEndian = (byteOrder === 0x4949);
        offset += 2;
        offset += 2;
        var ifdOffset = getU32(data, offset, littleEndian);
        offset += 4;
        return parseIFD(data, offset + ifdOffset - 8, littleEndian, offset - 8);
    }

    function parseIFD(data, offset, le, base) {
        var result = {};
        var count = getU16(data, offset, le);
        offset += 2;
        var tagMap = {
            0x010F: 'Make', 0x0110: 'Model', 0x0112: 'Orientation',
            0x0131: 'Software', 0x0132: 'DateTime',
            0x829A: 'ExposureTime', 0x829D: 'FNumber',
            0x8827: 'ISO', 0x920A: 'FocalLength'
        };
        for (var i = 0; i < count; i++) {
            var tag = getU16(data, offset, le);
            var type = getU16(data, offset + 2, le);
            var count2 = getU32(data, offset + 4, le);
            var valOffset = offset + 8;
            var name = tagMap[tag];
            if (name) {
                var val = readTagValue(data, valOffset, type, count2, le, base);
                if (val !== null) result[name] = val;
            }
            offset += 12;
        }
        return result;
    }

    function readTagValue(data, offset, type, count, le, base) {
        if (type === 2) {
            var strOff = count > 4 ? getU32(data, offset, le) + base : offset;
            var s = '';
            for (var i = 0; i < count - 1 && strOff + i < data.length; i++) {
                s += String.fromCharCode(data[strOff + i]);
            }
            return s;
        }
        if (type === 3) {
            return count === 1 ? getU16(data, offset, le) : getU16(data, getU32(data, offset, le) + base, le);
        }
        if (type === 4) {
            return count === 1 ? getU32(data, offset, le) : getU32(data, getU32(data, offset, le) + base, le);
        }
        if (type === 5) {
            var off = count === 1 ? offset : getU32(data, offset, le) + base;
            var num = getU32(data, off, le);
            var den = getU32(data, off + 4, le);
            return den > 0 ? num / den : 0;
        }
        return null;
    }

    function getU16(data, off, le) { return le ? (data[off] | (data[off+1] << 8)) : ((data[off] << 8) | data[off+1]); }
    function getU32(data, off, le) { return le ? (data[off] | (data[off+1]<<8) | (data[off+2]<<16) | (data[off+3]<<24)) : ((data[off]<<24) | (data[off+1]<<16) | (data[off+2]<<8) | data[off+3]); }

    function handleFileUpload(e) {
        var file = e.target.files[0];
        if (!file) return;

        var fmt = detectFormat(file);
        if (!fmt) {
            showToast('不支持的文件格式！');
            return;
        }

        currentFileName = file.name;
        currentFormat = fmt;
        originalFile = file;
        svgText = null;
        rasterDataUrl = null;
        rasterImageEl = null;
        currentRotation = 0;
        currentScaleX = 1;
        currentScaleY = 1;

        if (isSvg(fmt)) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                svgText = ev.target.result;
                var vb = parseViewBox(svgText);
                if (vb) { vbX = vb.x; vbY = vb.y; vbW = vb.w; vbH = vb.h; }
                else {
                    var wMatch = svgText.match(/\swidth\s*=\s*"([^"]*)"/);
                    var hMatch = svgText.match(/\sheight\s*=\s*"([^"]*)"/);
                    vbW = wMatch ? parseFloat(wMatch[1]) : 800;
                    vbH = hMatch ? parseFloat(hMatch[1]) : 600;
                    vbX = 0; vbY = 0;
                }
                vbDisplay.textContent = r(vbX) + ' ' + r(vbY) + ' ' + r(vbW) + ' ' + r(vbH);
                viewboxInfo.style.display = 'block';
                if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); }
                var blob = new Blob([svgText], { type: 'image/svg+xml' });
                currentBlobUrl = URL.createObjectURL(blob);
                if (cropper) { cropper.destroy(); cropper = null; }
                placeholder.style.display = 'none';
                cropImage.src = currentBlobUrl;
                updateFormatUI();
                detectSpriteRegions();
            };
            reader.readAsText(file);
        } else {
            var reader = new FileReader();
            reader.onload = function(ev) {
                rasterDataUrl = ev.target.result;
                var img = new Image();
                img.onload = function() {
                    rasterImageEl = img;
                    vbX = 0; vbY = 0;
                    vbW = img.naturalWidth;
                    vbH = img.naturalHeight;
                    vbDisplay.textContent = r(vbW) + ' x ' + r(vbH);
                    viewboxInfo.style.display = 'block';
                    if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); }
                    currentBlobUrl = rasterDataUrl;
                    if (cropper) { cropper.destroy(); cropper = null; }
                    placeholder.style.display = 'none';
                    cropImage.src = currentBlobUrl;
                    updateFormatUI();
                    detectSpriteRegions();
                    readExifData(file);
                    extractWebPFrames(file);
                };
                img.onerror = function() {
                    showToast('图片加载失败，格式可能不受浏览器支持');
                };
                img.src = rasterDataUrl;
            };
            reader.readAsDataURL(file);
        }

        var badgeClass = fmt;
        if (!['svg','png','jpg','gif','webp','bmp','avif','ico','tiff'].includes(fmt)) badgeClass = 'other';
        uploadInfo.innerHTML = '已上传: ' + file.name + ' <span class="format-badge ' + badgeClass + '">' + fmt.toUpperCase() + '</span>';
        uploadInfo.style.display = 'block';
    }

    cropImage.addEventListener('load', function() {
        naturalW = cropImage.naturalWidth;
        naturalH = cropImage.naturalHeight;
        if (!naturalW || !naturalH) { naturalW = vbW; naturalH = vbH; }
        originalSizeEl.textContent = naturalW + ' x ' + naturalH;
        if (cropper) { cropper.destroy(); }
        cropper = new Cropper(cropImage, {
            viewMode: 1, dragMode: 'move', aspectRatio: NaN,

    function downloadCroppedSvg(x, y, w, h) {

    function isCanvasSupportedFormat(fmt) {

    function downloadCroppedRaster(x, y, w, h) {
        if (!rasterImageEl) { showToast('图片尚未加载完成！'); return; }

        var outFmt = outputFormatSelect.value;
        var sourceFmt = currentFormat;

        if (outFmt === 'svg') {
            var svgContent = '<svg xmlns="http://www.w3.org/2000/svg" width="' + r(w) + '" height="' + r(h) + '" viewBox="0 0 ' + r(w) + ' ' + r(h) + '">';
            svgContent += '<image href="' + rasterDataUrl + '" x="' + r(-x) + '" y="' + r(-y) + '" width="' + r(vbW) + '" height="' + r(vbH) + '"/>';
            svgContent += '</svg>';
            var blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            var baseName = currentFileName.replace(/\.[^/.]+$/, '');
            link.download = baseName + '_crop.svg';
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('SVG 文件已下载！');
            return;
        }

        var targetFmt = outFmt === 'same' ? sourceFmt : outFmt;
        if (targetFmt === 'jpeg') targetFmt = 'jpg';
        if (!isCanvasSupportedFormat(targetFmt)) targetFmt = 'png';
        var mimeType = getMimeType(targetFmt);
        var quality = (targetFmt === 'jpg' || targetFmt === 'webp') ? parseInt(outputQuality.value) / 100 : undefined;

        var canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(w));
        canvas.height = Math.max(1, Math.round(h));
        var ctx = canvas.getContext('2d');

        if (targetFmt === 'jpg') {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        ctx.drawImage(rasterImageEl, x, y, w, h, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(function(blob) {
            if (!blob) { showToast('导出失败，浏览器可能不支持该格式'); return; }
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            var baseName = currentFileName.replace(/\.[^/.]+$/, '');
            var ext = getExt(targetFmt);
            link.download = baseName + '_crop_' + r(x) + '_' + r(y) + '_' + r(w) + '_' + r(h) + '.' + ext;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast(targetFmt.toUpperCase() + ' 文件已下载！');
        }, mimeType, quality);

    function compressSvg() {
        if (!isSvg(currentFormat)) { showToast('压缩功能仅支持 SVG 格式！'); return; }
        if (!svgText) { showToast('请先上传 SVG 文件！'); return; }
        if (!window.svgoOptimize) { showToast('SVGO 正在加载，请稍后重试...'); return; }
        var plugins = [];
        if (document.getElementById('optComments').checked) plugins.push('removeComments');
        if (document.getElementById('optMetadata').checked) plugins.push('removeMetadata');
        if (document.getElementById('optTitle').checked) { plugins.push('removeTitle'); plugins.push('removeDesc'); }
        if (document.getElementById('optEmptyAttrs').checked) plugins.push('removeEmptyAttrs');
        if (document.getElementById('optCleanupNum').checked) plugins.push('cleanupNumericValues');
        if (document.getElementById('optCollapseGroups').checked) plugins.push('collapseGroups');
        if (document.getElementById('optConvertPath').checked) plugins.push('convertPathData');
        if (document.getElementById('optRemoveEditor').checked) { plugins.push('removeEditorsNSData'); plugins.push('removeXMLProcInst'); }
        if (plugins.length === 0) plugins = ['preset-default'];

            var origLen = new Blob([svgText]).size;

            document.getElementById('compressResult').style.display = 'block';
            var blob = new Blob([result.data], { type: 'image/svg+xml;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            var baseName = currentFileName.replace(/\.[^/.]+$/, '');
            link.download = baseName + '_optimized.svg';
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            URL.revokeObjectURL(url);

    function initCompareSlider() {
        var slider = document.getElementById('compareSlider');

        var line = document.getElementById('compareLine');
        var handle = document.getElementById('compareHandle');
        if (!slider || !origClip || !line || !handle) return;

        var dragging = false;

        slider.addEventListener('touchstart', function(e) { dragging = true; moveSlider(e.touches[0]); }, { passive: true });
        document.addEventListener('mousemove', function(e) { if (dragging) moveSlider(e); });
        document.addEventListener('touchmove', function(e) { if (dragging) moveSlider(e.touches[0]); }, { passive: true });
        document.addEventListener('mouseup', function() { dragging = false; });

        function moveSlider(e) {
            var rect = slider.getBoundingClientRect();
