    function pushUndoState(x, y, w, h, rotation, scaleX, scaleY) {
        rotation = rotation !== undefined ? rotation : currentRotation;
        scaleX = scaleX !== undefined ? scaleX : currentScaleX;
        scaleY = scaleY !== undefined ? scaleY : currentScaleY;
        if (undoStack.length > 0) {
            var last = undoStack[undoStack.length - 1];
            if (Math.abs(last.x - x) < 0.5 && Math.abs(last.y - y) < 0.5 && Math.abs(last.w - w) < 0.5 && Math.abs(last.h - h) < 0.5 && last.rotation === rotation && last.scaleX === scaleX && last.scaleY === scaleY) return;
        }
        undoStack.push({ x: x, y: y, w: w, h: h, rotation: rotation, scaleX: scaleX, scaleY: scaleY });
        if (undoStack.length > maxUndoSteps) undoStack.shift();
        redoStack = [];
    }

    function undo() {
        if (undoStack.length <= 1) { showToast('没有更多可撤销的操作'); return; }
        var current = undoStack.pop();
        redoStack.push(current);
        var prev = undoStack[undoStack.length - 1];
        applyUndoRedoState(prev);
    }

    function redo() {
        if (redoStack.length === 0) { showToast('没有更多可重做的操作'); return; }
        var state = redoStack.pop();
        undoStack.push(state);
        applyUndoRedoState(state);
    }

    function applyUndoRedoState(state) {
        if (!cropper) return;
        isUndoRedoAction = true;

        if (state.rotation !== undefined) {
            currentRotation = state.rotation;
            currentScaleX = state.scaleX !== undefined ? state.scaleX : 1;
            currentScaleY = state.scaleY !== undefined ? state.scaleY : 1;
            cropper.rotateTo(state.rotation);
            cropper.scaleX(currentScaleX);
            cropper.scaleY(currentScaleY);
        }

        var px = viewBoxToPixel(state.x, state.y, state.w, state.h);
        cropper.setData({ x: px.x, y: px.y, width: px.w, height: px.h });
        cropXInput.value = r(state.x);
        cropYInput.value = r(state.y);
        cropWInput.value = r(state.w);
        cropHInput.value = r(state.h);
        updateCropInfo();
        syncActiveSpriteRegion(state.x, state.y, state.w, state.h);
    }

    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey || e.metaKey) {
            if (e.key === 'z' || e.key === 'Z') {
                e.preventDefault();
                if (e.shiftKey) { redo(); } else { undo(); }
            }
            if (e.key === 'y' || e.key === 'Y') {
                e.preventDefault();
                redo();
            }
        }
    });

    function multiFormatExport() {
        if (!rasterImageEl) { showToast('请先上传图片！'); return; }

        showProgress('正在生成多格式对比...', 5);

        var maxWidth = parseInt(document.getElementById('compMaxWidth').value) || 0;
        var maxHeight = parseInt(document.getElementById('compMaxHeight').value) || 0;
        var quality = parseInt(document.getElementById('compQuality').value) / 100;

        var w = rasterImageEl.naturalWidth;
        var h = rasterImageEl.naturalHeight;
        if (maxWidth > 0 && w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        if (maxHeight > 0 && h > maxHeight) { w = Math.round(w * maxHeight / h); h = maxHeight; }
        w = Math.max(1, w); h = Math.max(1, h);

        var formats = [
            { fmt: 'webp', label: 'WebP', mimeType: 'image/webp' },
            { fmt: 'jpg', label: 'JPEG', mimeType: 'image/jpeg' },
            { fmt: 'png', label: 'PNG', mimeType: 'image/png' }
        ];

        var results = [];
        var idx = 0;

        (function nextFormat() {
            if (idx >= formats.length) {
                hideProgress();
                var origSize = originalFile ? originalFile.size : 0;
                var msg = '多格式对比结果:\n';
                for (var i = 0; i < results.length; i++) {
                    var r = results[i];
                    var saved = origSize > 0 ? ((1 - r.size / origSize) * 100).toFixed(1) : '0.0';
                    msg += r.label + ': ' + formatBytes(r.size) + ' (节省 ' + saved + '%)\n';
                }
                showToast('多格式导出完成，请查看下载文件');
                return;
            }

            var f = formats[idx];
            idx++;
            showProgress('导出 ' + f.label + '...', (idx / formats.length) * 80);

            var canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            var ctx = canvas.getContext('2d');
            if (f.fmt === 'jpg') { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h); }
            ctx.drawImage(rasterImageEl, 0, 0, w, h);

            var needsQuality = f.fmt === 'jpg' || f.fmt === 'webp';
            canvas.toBlob(function(blob) {
                if (blob) {
                    results.push({ fmt: f.fmt, label: f.label, size: blob.size });
                    var url = URL.createObjectURL(blob);
                    var link = document.createElement('a');
                    link.href = url;
                    var baseName = currentFileName.replace(/\.[^/.]+$/, '');
                    link.download = baseName + '.' + f.fmt;
                    document.body.appendChild(link); link.click(); document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }
                setTimeout(nextFormat, 200);
            }, f.mimeType, needsQuality ? quality : undefined);
        })();
    }

    function compressRaster() {
        if (!rasterImageEl) { showToast('请先上传图片！'); return; }

        var compFmt = document.getElementById('compFormat').value;
        var quality = parseInt(document.getElementById('compQuality').value) / 100;
        var maxSizeKB = parseFloat(document.getElementById('compMaxSize').value) || 0;
        var maxWidth = parseInt(document.getElementById('compMaxWidth').value) || 0;
        var maxHeight = parseInt(document.getElementById('compMaxHeight').value) || 0;

        var targetFmt = compFmt === 'same' ? currentFormat : compFmt;
        if (targetFmt === 'jpeg') targetFmt = 'jpg';
        if (!isCanvasSupportedFormat(targetFmt)) targetFmt = 'png';

        var isSameFormat = (compFmt === 'same');
        var isPngTarget = targetFmt === 'png';

        if (isPngTarget && isSameFormat && !maxWidth && !maxHeight && !maxSizeKB) {
            showToast('PNG 是无损格式，无法通过质量参数压缩。请缩小尺寸或转为 WebP/JPEG 格式');
            return;
        }

        var w = rasterImageEl.naturalWidth;
        var h = rasterImageEl.naturalHeight;
        var origW = w, origH = h;

        if (maxWidth > 0 && w > maxWidth) {
            h = Math.round(h * maxWidth / w);
            w = maxWidth;
        }
        if (maxHeight > 0 && h > maxHeight) {
            w = Math.round(w * maxHeight / h);
            h = maxHeight;
        }

        w = Math.max(1, w);
        h = Math.max(1, h);

        var sizeReduced = (w < origW || h < origH);

        if (isPngTarget && !sizeReduced && !maxSizeKB) {
            showToast('PNG 无损格式，未缩小尺寸时无法压缩。请设置尺寸限制或转为 WebP');
            return;
        }

        showProgress('正在压缩...', 10);

        var origSize = originalFile ? originalFile.size : 0;

        function doCompress(q) {
            return new Promise(function(resolve) {
                var canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                var ctx = canvas.getContext('2d');
                if (targetFmt === 'jpg') {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, w, h);
                }
                ctx.drawImage(rasterImageEl, 0, 0, w, h);
                var mimeType = getMimeType(targetFmt);
                var needsQuality = targetFmt === 'jpg' || targetFmt === 'webp';
                canvas.toBlob(function(blob) {
                    resolve(blob);
                }, mimeType, needsQuality ? q : undefined);
            });
        }

        function finishCompress(blob, origSz, fmt) {
            hideProgress();
            if (!blob) { showToast('压缩失败'); return; }

            var compSize = blob.size;
            var savedPct = origSz > 0 ? ((1 - compSize / origSz) * 100).toFixed(1) : '0.0';
            var isLarger = compSize > origSz && origSz > 0;

            document.getElementById('rOrigSize').textContent = formatBytes(origSz);
            document.getElementById('rCompSize').textContent = formatBytes(compSize);
            document.getElementById('rSavedPct').textContent = (isLarger ? '+' : '') + savedPct + '%';
            document.getElementById('rSizeBarInner').style.width = origSz > 0 ? Math.min(compSize / origSz * 100, 100) + '%' : '100%';
            document.getElementById('rSizeBarInner').style.background = isLarger ? '#ef4444' : '#22c55e';
            document.getElementById('rasterCompressResult').style.display = 'block';

            var previewOrigImg = document.getElementById('previewOrigImg');
            var previewCompImg = document.getElementById('previewCompImg');
            previewOrigImg.src = rasterDataUrl;
            previewCompImg.src = URL.createObjectURL(blob);
            document.getElementById('compressPreview').style.display = 'block';
            initCompareSlider();

            if (isLarger && isSameFormat) {
                showToast('同格式重编码后文件更大（+' + savedPct + '%），建议转为 WebP 格式');
                var url = URL.createObjectURL(blob);
                var link = document.createElement('a');
                link.href = url;
                var baseName = currentFileName.replace(/\.[^/.]+$/, '');
                var ext = getExt(fmt);
                link.download = baseName + '_compressed.' + ext;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                URL.revokeObjectURL(url);
                return;
            }

            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            var baseName = currentFileName.replace(/\.[^/.]+$/, '');
            var ext = getExt(fmt);
            link.download = baseName + '_compressed.' + ext;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('压缩完成！节省 ' + savedPct + '%');
        }

        if (maxSizeKB > 0 && (targetFmt === 'jpg' || targetFmt === 'webp')) {
            var maxSizeBytes = maxSizeKB * 1024;
            var lo = 0.01, hi = 1.0;
            var bestBlob = null;
            var iterations = 0;
            var maxIter = 12;

            (function iterate() {
                if (lo > hi || iterations >= maxIter) {
                    finishCompress(bestBlob || null, origSize, targetFmt);
                    return;
                }
                var mid = (lo + hi) / 2;
                iterations++;
                showProgress('二分搜索最佳质量... (' + iterations + '/' + maxIter + ')', 10 + (iterations / maxIter) * 70);

                doCompress(mid).then(function(blob) {
                    if (!blob) { finishCompress(null, origSize, targetFmt); return; }
                    bestBlob = blob;
                    if (blob.size <= maxSizeBytes) {
                        lo = mid + 0.01;
                    } else {
                        hi = mid - 0.01;
                    }
                    setTimeout(iterate, 10);
                });
            })();
        } else if (isPngTarget && maxSizeKB > 0) {
            var origW2 = rasterImageEl.naturalWidth;
            var origH2 = rasterImageEl.naturalHeight;
            var maxSizeBytes = maxSizeKB * 1024;
            var bestBlob = null;
            var bestScale = 1;
            var scales = [1, 0.9, 0.8, 0.7, 0.6, 0.5, 0.4, 0.3, 0.25, 0.2];
            var scaleIdx = 0;

            (function tryScale() {
                if (scaleIdx >= scales.length) {
                    finishCompress(bestBlob || null, origSize, targetFmt);
                    return;
                }
                var s = scales[scaleIdx];
                scaleIdx++;
                w = Math.max(1, Math.round(origW2 * s));
                h = Math.max(1, Math.round(origH2 * s));
                showProgress('PNG 尺寸缩放 ' + Math.round(s * 100) + '%...', 10 + scaleIdx * 8);

                doCompress(1).then(function(blob) {
                    if (blob && blob.size <= maxSizeBytes) {
                        bestBlob = blob;
                        bestScale = s;
                        finishCompress(blob, origSize, targetFmt);
                        return;
                    }
                    if (blob && (!bestBlob || blob.size < bestBlob.size)) {
                        bestBlob = blob;
                        bestScale = s;
                    }
                    setTimeout(tryScale, 10);
                });
            })();
        } else {
            doCompress(quality).then(function(blob) {
                showProgress('完成！', 100);
                setTimeout(function() { finishCompress(blob, origSize, targetFmt); }, 200);
            });
        }
    }

    function detectByPixelGap() {
        if (!rasterImageEl) { showToast('请先上传光栅图片！'); return; }

        showProgress('正在扫描像素...', 5);

        var img = rasterImageEl;
        var w = img.naturalWidth;
        var h = img.naturalHeight;

        var scanCanvas, scanCtx, imageData;

        if (typeof OffscreenCanvas !== 'undefined') {
            scanCanvas = new OffscreenCanvas(w, h);
            scanCtx = scanCanvas.getContext('2d');
            scanCtx.drawImage(img, 0, 0);
            imageData = scanCtx.getImageData(0, 0, w, h);
        } else {
            scanCanvas = document.createElement('canvas');
            scanCanvas.width = w;
            scanCanvas.height = h;
            scanCtx = scanCanvas.getContext('2d');
            scanCtx.drawImage(img, 0, 0);
            imageData = scanCtx.getImageData(0, 0, w, h);
        }

        var pixels = imageData.data;
        var alphaThreshold = 30;
        var maxRegions = parseInt(document.getElementById('spriteCount').value) || 20;

        showProgress('正在扫描透明间隙...', 15);

        var rowTransparent = new Uint8Array(h);
        var colTransparent = new Uint8Array(w);

        for (var y = 0; y < h; y++) {
            var allAlpha = true;
            for (var x = 0; x < w; x++) {
                if (pixels[(y * w + x) * 4 + 3] >= alphaThreshold) {
                    allAlpha = false;
                    break;
                }
            }
            rowTransparent[y] = allAlpha ? 1 : 0;
        }

        for (var x = 0; x < w; x++) {
            var allAlpha = true;
            for (var y = 0; y < h; y++) {
                if (pixels[(y * w + x) * 4 + 3] >= alphaThreshold) {
                    allAlpha = false;
                    break;
                }
            }
            colTransparent[x] = allAlpha ? 1 : 0;
        }

        var hasTransparentRows = false;
        var hasTransparentCols = false;
        for (var y = 0; y < h; y++) { if (rowTransparent[y]) { hasTransparentRows = true; break; } }
        for (var x = 0; x < w; x++) { if (colTransparent[x]) { hasTransparentCols = true; break; } }

        var regions = [];

        if (hasTransparentRows || hasTransparentCols) {
            showProgress('透明间隙检测中...', 30);
            regions = detectByTransparentGaps(w, h, rowTransparent, colTransparent);
        }

        if (regions.length === 0) {
            showProgress('尝试颜色聚类检测...', 40);
            regions = detectByColorClustering(w, h, pixels, maxRegions);
        }

        if (regions.length === 0) {
            showProgress('尝试边缘检测...', 50);
            regions = detectByEdgeScan(w, h, pixels, alphaThreshold, maxRegions);
        }

        showProgress('正在整理区域...', 80);

        if (regions.length > maxRegions) {
            regions.sort(function(a, b) { return (b.w * b.h) - (a.w * a.h); });
            regions = regions.slice(0, maxRegions);
        }

        regions.sort(function(a, b) {
            if (a.y < b.y - 5) return -1;
            if (a.y > b.y + 5) return 1;
            return a.x - b.x;
        });

        spriteRegions = [];
        for (var i = 0; i < regions.length; i++) {
            regionCounter++;
            spriteRegions.push({
                name: 'sprite_' + String(regionCounter).padStart(2, '0'),
                x: regions[i].x,
                y: regions[i].y,
                w: regions[i].w,
                h: regions[i].h
            });
        }

        showProgress('完成！检测到 ' + spriteRegions.length + ' 个区域', 100);
        setTimeout(function() { hideProgress(); }, 500);
        renderSpriteList();
    }

    function detectByTransparentGaps(w, h, rowTransparent, colTransparent) {
        var rowRanges = [];
        var inRange = false;
        var rangeStart = 0;
        for (var y = 0; y < h; y++) {
            if (!rowTransparent[y] && !inRange) {
                inRange = true;
                rangeStart = y;
            } else if (rowTransparent[y] && inRange) {
                inRange = false;
                rowRanges.push({ start: rangeStart, end: y - 1 });
            }
        }
        if (inRange) rowRanges.push({ start: rangeStart, end: h - 1 });

        var colRanges = [];
        inRange = false;
        for (var x = 0; x < w; x++) {
            if (!colTransparent[x] && !inRange) {
                inRange = true;
                rangeStart = x;
            } else if (colTransparent[x] && inRange) {
                inRange = false;
                colRanges.push({ start: rangeStart, end: x - 1 });
            }
        }
        if (inRange) colRanges.push({ start: rangeStart, end: w - 1 });

        var regions = [];
        for (var ri = 0; ri < rowRanges.length; ri++) {
            for (var ci = 0; ci < colRanges.length; ci++) {
                var ry = rowRanges[ri];
                var cx = colRanges[ci];
                var rw = cx.end - cx.start + 1;
                var rh = ry.end - ry.start + 1;
                if (rw >= 2 && rh >= 2) {
                    regions.push({ x: cx.start, y: ry.start, w: rw, h: rh });
                }
            }
        }

        return regions;
    }

    function detectByColorClustering(w, h, pixels, maxRegions) {
        var step = Math.max(2, Math.floor(Math.sqrt(w * h / 10000)));
        var bgColor = getMostCommonEdgeColor(w, h, pixels);

        if (!bgColor) return [];

        var threshold = 50;
        var visited = new Uint8Array(w * h);
        var regions = [];

        function isBg(px, py) {
            var idx = (py * w + px) * 4;
            var dr = Math.abs(pixels[idx] - bgColor.r);
            var dg = Math.abs(pixels[idx + 1] - bgColor.g);
            var db = Math.abs(pixels[idx + 2] - bgColor.b);
            var da = Math.abs(pixels[idx + 3] - bgColor.a);
            return dr < threshold && dg < threshold && db < threshold && da < threshold;
        }

        function scanFill(startX, startY) {
            var minX = startX, maxX = startX, minY = startY, maxY = startY;
            var stack = [startX, startY];
            var pixelCount = 0;

            while (stack.length > 0) {
                var cy = stack.pop();
                var cx = stack.pop();

                if (cx < 0 || cx >= w || cy < 0 || cy >= h) continue;
                var pos = cy * w + cx;
                if (visited[pos]) continue;
                if (isBg(cx, cy)) continue;

                visited[pos] = 1;
                pixelCount++;

                if (cx < minX) minX = cx;
                if (cx > maxX) maxX = cx;
                if (cy < minY) minY = cy;
                if (cy > maxY) maxY = cy;

                if (pixelCount < 500000) {
                    stack.push(cx + 1, cy);
                    stack.push(cx - 1, cy);
                    stack.push(cx, cy + 1);
                    stack.push(cx, cy - 1);
                }
            }

            if (pixelCount > 8) {
                return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
            }
            return null;
        }

        for (var y = 0; y < h; y += step) {
            for (var x = 0; x < w; x += step) {
                var pos = y * w + x;
                if (!visited[pos] && !isBg(x, y)) {
                    var region = scanFill(x, y);
                    if (region) regions.push(region);
                }
            }
        }

        var merged = true;
        var mergePasses = 0;
        while (merged && mergePasses < 5) {
            merged = false;
            mergePasses++;
            for (var i = 0; i < regions.length; i++) {
                if (!regions[i]) continue;
                for (var j = i + 1; j < regions.length; j++) {
                    if (!regions[j]) continue;
                    var a = regions[i], b = regions[j];
                    var gap = 3;
                    var overlapX = a.x - gap < b.x + b.w && a.x + a.w + gap > b.x;
                    var overlapY = a.y - gap < b.y + b.h && a.y + a.h + gap > b.y;
                    if (overlapX && overlapY) {
                        var nx = Math.min(a.x, b.x);
                        var ny = Math.min(a.y, b.y);
                        var nw = Math.max(a.x + a.w, b.x + b.w) - nx;
                        var nh = Math.max(a.y + a.h, b.y + b.h) - ny;
                        regions[i] = { x: nx, y: ny, w: nw, h: nh };
                        regions[j] = null;
                        merged = true;
                    }
                }
            }
            regions = regions.filter(function(r) { return r !== null; });
        }

        return regions;
    }

    function getMostCommonEdgeColor(w, h, pixels) {
        var colorMap = {};
        var quantize = 32;

        function addEdgePixel(x, y) {
            var idx = (y * w + x) * 4;
            var r = Math.floor(pixels[idx] / quantize) * quantize;
            var g = Math.floor(pixels[idx + 1] / quantize) * quantize;
            var b = Math.floor(pixels[idx + 2] / quantize) * quantize;
            var a = Math.floor(pixels[idx + 3] / quantize) * quantize;
            var key = r + ',' + g + ',' + b + ',' + a;
            colorMap[key] = (colorMap[key] || 0) + 1;
        }

        for (var x = 0; x < w; x++) {
            addEdgePixel(x, 0);
            addEdgePixel(x, h - 1);
        }
        for (var y = 1; y < h - 1; y++) {
            addEdgePixel(0, y);
            addEdgePixel(w - 1, y);
        }

        var maxCount = 0;
        var maxKey = null;
        var totalEdge = 2 * (w + h) - 4;
        for (var key in colorMap) {
            if (colorMap[key] > maxCount) {
                maxCount = colorMap[key];
                maxKey = key;
            }
        }

        if (!maxKey || maxCount < totalEdge * 0.3) return null;

        var parts = maxKey.split(',');
        return { r: parseInt(parts[0]), g: parseInt(parts[1]), b: parseInt(parts[2]), a: parseInt(parts[3]) };
    }

    function detectByEdgeScan(w, h, pixels, alphaThreshold, maxRegions) {
        var cols = Math.ceil(Math.sqrt(maxRegions));
        var rows = Math.ceil(maxRegions / cols);
        var cellW = Math.floor(w / cols);
        var cellH = Math.floor(h / rows);
        var regions = [];

        for (var row = 0; row < rows; row++) {
            for (var col = 0; col < cols; col++) {
                if (regions.length >= maxRegions) break;
                var sx = col * cellW;
                var sy = row * cellH;
                var ex = (col === cols - 1) ? w : (col + 1) * cellW;
                var ey = (row === rows - 1) ? h : (row + 1) * cellH;

                var minX = ex, minY = ey, maxX = sx, maxY = sy;
                var hasContent = false;

                for (var y = sy; y < ey; y++) {
                    for (var x = sx; x < ex; x++) {
                        if (pixels[(y * w + x) * 4 + 3] >= alphaThreshold) {
                            hasContent = true;
                            if (x < minX) minX = x;
                            if (x > maxX) maxX = x;
                            if (y < minY) minY = y;
                            if (y > maxY) maxY = y;
                        }
                    }
                }

                if (hasContent) {
                    regions.push({ x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 });
                }
            }
        }

        return regions;
    }

    function exportSpriteSheet() {
        if (spriteRegions.length === 0) { showToast('没有精灵区域可导出'); return; }
        if (!rasterImageEl) { showToast('请先上传光栅图片！'); return; }

        var padding = 2;
        var totalW = 0, totalH = 0;

        var maxSpriteW = 0, maxSpriteH = 0;
        for (var i = 0; i < spriteRegions.length; i++) {
            if (spriteRegions[i].w > maxSpriteW) maxSpriteW = spriteRegions[i].w;
            if (spriteRegions[i].h > maxSpriteH) maxSpriteH = spriteRegions[i].h;
        }

        var cols = Math.ceil(Math.sqrt(spriteRegions.length));
        var rows = Math.ceil(spriteRegions.length / cols);

        totalW = cols * (maxSpriteW + padding) + padding;
        totalH = rows * (maxSpriteH + padding) + padding;

        var canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(totalW));
        canvas.height = Math.max(1, Math.round(totalH));
        var ctx = canvas.getContext('2d');

        var cssLines = [];
        cssLines.push('/* Sprite Sheet: ' + currentFileName + ' */');
        cssLines.push('/* Source: ' + r(vbW) + ' x ' + r(vbH) + ' → Sheet: ' + totalW + ' x ' + totalH + ' */');
        cssLines.push('');

        for (var i = 0; i < spriteRegions.length; i++) {
            var s = spriteRegions[i];
            var col = i % cols;
            var row = Math.floor(i / cols);
            var dx = padding + col * (maxSpriteW + padding);
            var dy = padding + row * (maxSpriteH + padding);

            ctx.drawImage(rasterImageEl, s.x, s.y, s.w, s.h, dx, dy, s.w, s.h);

            cssLines.push('.' + s.name + ' {');
            cssLines.push('  width: ' + r(s.w) + 'px;');
            cssLines.push('  height: ' + r(s.h) + 'px;');
            cssLines.push('  background: url(\'sprite_sheet.png\') no-repeat;');
            cssLines.push('  background-position: -' + dx + 'px -' + dy + 'px;');
            cssLines.push('}');
            cssLines.push('');
        }

        var targetFmt = currentFormat;
        if (targetFmt === 'jpeg') targetFmt = 'jpg';
        if (!isCanvasSupportedFormat(targetFmt)) targetFmt = 'png';

        var mimeType = getMimeType(targetFmt);
        var quality = (targetFmt === 'jpg' || targetFmt === 'webp') ? parseInt(outputQuality.value) / 100 : undefined;

        if (targetFmt === 'jpg') {
            var jpgCanvas = document.createElement('canvas');
            jpgCanvas.width = canvas.width;
            jpgCanvas.height = canvas.height;
            var jpgCtx = jpgCanvas.getContext('2d');
            jpgCtx.fillStyle = '#ffffff';
            jpgCtx.fillRect(0, 0, jpgCanvas.width, jpgCanvas.height);
            jpgCtx.drawImage(canvas, 0, 0);
            canvas = jpgCanvas;
        }

        canvas.toBlob(function(blob) {
            if (!blob) { showToast('导出失败'); return; }
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            var baseName = currentFileName.replace(/\.[^/.]+$/, '');
            var ext = getExt(targetFmt);
            link.download = baseName + '_spritesheet.' + ext;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            URL.revokeObjectURL(url);

            var cssBlob = new Blob([cssLines.join('\n')], { type: 'text/css' });
            var cssUrl = URL.createObjectURL(cssBlob);
            var cssLink = document.createElement('a');
            cssLink.href = cssUrl;
            cssLink.download = baseName + '_spritesheet.css';
            document.body.appendChild(cssLink); cssLink.click(); document.body.removeChild(cssLink);
            URL.revokeObjectURL(cssUrl);

            showToast('精灵图合图已导出！');
        }, mimeType, quality);
    }

    function detectSpriteRegions() {
        if (!currentFormat) return;

        var count = parseInt(document.getElementById('spriteCount').value) || 5;
        var layout = document.getElementById('spriteLayout').value;

        spriteRegions = [];
        regionCounter = 0;

        if (isSvg(currentFormat) && layout === 'dom') {
            detectByDom();
        } else if (layout === 'pixel') {
            if (isRaster(currentFormat)) {
                detectByPixelGap();
            } else {
                showToast('像素检测仅支持光栅图片格式');
                return;
            }
        } else if (layout === 'horizontal') {
            detectByLayout(count, 1, count);
        } else if (layout === 'vertical') {
            detectByLayout(count, count, 1);
        } else if (layout === 'grid') {
            var cols = Math.ceil(Math.sqrt(count));
            var rows = Math.ceil(count / cols);
            detectByLayout(count, rows, cols);
        } else {
            if (isSvg(currentFormat)) {
                var domRegions = tryDetectByDom();
                if (domRegions.length > 0 && Math.abs(domRegions.length - count) <= 2) {
                    spriteRegions = domRegions;
                    regionCounter = spriteRegions.length;
                } else {
                    autoDetectLayout(count);
                }
            } else {
                autoDetectLayout(count);
            }
        }

        renderSpriteList();
    }

    function autoDetectLayout(count) {
        var aspectRatio = vbW / vbH;
        if (aspectRatio > count * 0.8) {
            detectByLayout(count, 1, count);
        } else if (aspectRatio < 0.8 / count) {
            detectByLayout(count, count, 1);
        } else {
            var cols = Math.ceil(Math.sqrt(count * aspectRatio));
            var rows = Math.ceil(count / cols);
            detectByLayout(count, rows, cols);
        }
    }

    function tryDetectByDom() {
        var regions = [];
        var parser = new DOMParser();
        var doc = parser.parseFromString(svgText, 'image/svg+xml');
        var svgEl = doc.querySelector('svg');
        if (!svgEl) return regions;

        var svgContainer = document.createElement('div');
        svgContainer.style.cssText = 'position:absolute;left:-9999px;top:-9999px;visibility:hidden;';
        svgContainer.style.width = vbW + 'px';
        svgContainer.style.height = vbH + 'px';
        document.body.appendChild(svgContainer);

        var clone = svgEl.cloneNode(true);
        clone.setAttribute('width', vbW);
        clone.setAttribute('height', vbH);
        svgContainer.appendChild(clone);

        var children = clone.children;
        var idx = 0;
        for (var i = 0; i < children.length; i++) {
            var child = children[i];
            if (child.tagName === 'defs' || child.tagName === 'metadata' || child.tagName === 'title' || child.tagName === 'desc' || child.tagName === 'style') continue;
            try {
                var bbox = child.getBBox();
                if (bbox.width > 0 && bbox.height > 0) {
                    idx++;
                    regions.push({
                        name: child.id || ('sprite_' + String(idx).padStart(2, '0')),
                        x: bbox.x, y: bbox.y, w: bbox.width, h: bbox.height
                    });
                }
            } catch (e) {}
        }

        document.body.removeChild(svgContainer);
        return regions;
    }

    function detectByDom() {
        spriteRegions = tryDetectByDom();
        regionCounter = spriteRegions.length;
    }

    function detectByLayout(count, rows, cols) {
        var cellW = vbW / cols;
        var cellH = vbH / rows;

        for (var row = 0; row < rows; row++) {
            for (var col = 0; col < cols; col++) {
                if (spriteRegions.length >= count) break;
                regionCounter++;
                spriteRegions.push({
                    name: 'sprite_' + String(regionCounter).padStart(2, '0'),
                    x: vbX + col * cellW,
                    y: vbY + row * cellH,
                    w: cellW,
                    h: cellH
                });
            }
        }
    }

    function renderSpriteList() {
        if (spriteRegions.length === 0) {
            spriteList.innerHTML = '<div class="sprite-empty">未检测到区域，请点击"检测"或"自定义区域"</div>';
            spriteCssOutput.style.display = 'none';
            if (isRaster(currentFormat)) exportSheetBtn.style.display = 'none';
            document.getElementById('batchDownloadBtn').style.display = 'none';
            return;
        }

        if (isRaster(currentFormat)) exportSheetBtn.style.display = '';
        document.getElementById('batchDownloadBtn').style.display = '';

        var html = '<div class="sprite-batch-bar">';
        html += '<span class="batch-info">共 ' + spriteRegions.length + ' 个区域</span>';
        html += '<button class="btn-purple btn-sm" id="selectAllBtn">全选</button>';
        html += '<button class="btn-secondary btn-sm" id="mergeSelectedBtn">合并选中</button>';
        html += '</div>';

        var cssLines = [];
        var fmtLabel = currentFormat ? currentFormat.toUpperCase() : 'IMG';
        cssLines.push('/* Sprite: ' + currentFileName + ' (' + fmtLabel + ') */');
        cssLines.push('/* Size: ' + r(vbW) + ' x ' + r(vbH) + ' */');
        cssLines.push('');

        for (var i = 0; i < spriteRegions.length; i++) {
            var s = spriteRegions[i];
            var bgPosX = -(s.x - vbX);
            var bgPosY = -(s.y - vbY);

            html += '<div class="sprite-item" data-idx="' + i + '" draggable="true">';
            html += '<span class="drag-handle" title="拖拽排序">⠿</span>';
            html += '<div class="sprite-item-idx">' + (i + 1) + '</div>';
            html += '<div class="sprite-item-thumb" data-idx="' + i + '"></div>';
            html += '<div class="sprite-item-info">';
            html += '<div class="sprite-item-name"><input type="text" value="' + s.name + '" data-idx="' + i + '" class="name-input"></div>';
            html += '<div class="sprite-item-coords">' + r(s.x) + ', ' + r(s.y) + ' | ' + r(s.w) + ' x ' + r(s.h) + '</div>';
            html += '</div>';
            html += '<div class="sprite-item-btns">';
            html += '<button class="sprite-item-btn crop-btn" data-idx="' + i + '">✂</button>';
            html += '<button class="sprite-item-btn dl-btn" data-idx="' + i + '">⬇</button>';
            html += '<button class="sprite-item-btn locate-btn" data-idx="' + i + '">📍</button>';
            html += '<button class="sprite-item-btn del-btn" data-idx="' + i + '">✕</button>';
            html += '</div>';
            html += '</div>';

            cssLines.push('.' + s.name + ' {');
            cssLines.push('  width: ' + r(s.w) + 'px;');
            cssLines.push('  height: ' + r(s.h) + 'px;');
            cssLines.push('  background: url(\'' + currentFileName + '\') no-repeat;');
            cssLines.push('  background-position: ' + r(bgPosX) + 'px ' + r(bgPosY) + 'px;');
            cssLines.push('  background-size: ' + r(vbW) + 'px ' + r(vbH) + 'px;');
            cssLines.push('}');
            cssLines.push('');
        }

        spriteList.innerHTML = html;
        spriteCssOutput.textContent = cssLines.join('\n');
        spriteCssOutput.style.display = 'block';

        renderSpriteThumbnails();

        var selectAllBtn = document.getElementById('selectAllBtn');
        if (selectAllBtn) {
            selectAllBtn.addEventListener('click', function() {
                var items = spriteList.querySelectorAll('.sprite-item');
                var allSelected = true;
                items.forEach(function(item) { if (!item.classList.contains('selected')) allSelected = false; });
                items.forEach(function(item) {
                    if (allSelected) item.classList.remove('selected');
                    else item.classList.add('selected');
                });
            });
        }

        var mergeSelectedBtn = document.getElementById('mergeSelectedBtn');
        if (mergeSelectedBtn) {
            mergeSelectedBtn.addEventListener('click', function() {
                var selectedItems = spriteList.querySelectorAll('.sprite-item.selected');
                if (selectedItems.length < 2) { showToast('请先选择至少2个区域（点击区域项选中）'); return; }
                var indices = [];
                selectedItems.forEach(function(item) { indices.push(parseInt(item.getAttribute('data-idx'))); });
                indices.sort(function(a, b) { return a - b; });
                var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                for (var k = 0; k < indices.length; k++) {
                    var s = spriteRegions[indices[k]];
                    if (s.x < minX) minX = s.x;
                    if (s.y < minY) minY = s.y;
                    if (s.x + s.w > maxX) maxX = s.x + s.w;
                    if (s.y + s.h > maxY) maxY = s.y + s.h;
                }
                for (var k = indices.length - 1; k >= 0; k--) {
                    spriteRegions.splice(indices[k], 1);
                }
                regionCounter++;
                spriteRegions.push({ name: 'sprite_merged_' + String(regionCounter).padStart(2, '0'), x: minX, y: minY, w: maxX - minX, h: maxY - minY });
                renderSpriteList();
                showToast('已合并 ' + indices.length + ' 个区域');
            });
        }

        spriteList.querySelectorAll('.name-input').forEach(function(input) {
            input.addEventListener('change', function() {
                var idx = parseInt(input.getAttribute('data-idx'));
                spriteRegions[idx].name = input.value;
                updateCssOutput();
            });
            input.addEventListener('click', function(e) { e.stopPropagation(); });
        });

        spriteList.querySelectorAll('.sprite-item').forEach(function(item) {
            item.addEventListener('click', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.classList.contains('sprite-item-btn')) return;
                var idx = parseInt(item.getAttribute('data-idx'));
                locateSpriteRegion(idx);
            });
        });

        spriteList.querySelectorAll('.dl-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                downloadSpriteRegion(parseInt(btn.getAttribute('data-idx')));
            });
        });

        spriteList.querySelectorAll('.crop-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                var idx = parseInt(btn.getAttribute('data-idx'));
                locateSpriteRegion(idx);
                downloadCropped();
            });
        });

        spriteList.querySelectorAll('.locate-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                locateSpriteRegion(parseInt(btn.getAttribute('data-idx')));
            });
        });

        spriteList.querySelectorAll('.del-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                var idx = parseInt(btn.getAttribute('data-idx'));
                spriteRegions.splice(idx, 1);
                renderSpriteList();
                showToast('已删除区域');
            });
        });

        var dragSrcIdx = null;
        spriteList.querySelectorAll('.sprite-item').forEach(function(item) {
            item.addEventListener('dragstart', function(e) {
                dragSrcIdx = parseInt(item.getAttribute('data-idx'));
                item.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', dragSrcIdx);
            });
            item.addEventListener('dragend', function() {
                item.classList.remove('dragging');
                spriteList.querySelectorAll('.sprite-item').forEach(function(el) { el.classList.remove('drag-over'); });
            });
            item.addEventListener('dragover', function(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                spriteList.querySelectorAll('.sprite-item').forEach(function(el) { el.classList.remove('drag-over'); });
                item.classList.add('drag-over');
            });
            item.addEventListener('dragleave', function() {
                item.classList.remove('drag-over');
            });
            item.addEventListener('drop', function(e) {
                e.preventDefault();
                item.classList.remove('drag-over');
                var targetIdx = parseInt(item.getAttribute('data-idx'));
                if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
                var moved = spriteRegions.splice(dragSrcIdx, 1)[0];
                spriteRegions.splice(targetIdx, 0, moved);
                renderSpriteList();
                showToast('已调整顺序');
            });
        });
    }

    function renderSpriteThumbnails() {
        if (isSvg(currentFormat)) return;
        if (!rasterImageEl) return;

        for (var i = 0; i < spriteRegions.length; i++) {
            var s = spriteRegions[i];
            var thumbEl = spriteList.querySelector('.sprite-item-thumb[data-idx="' + i + '"]');
            if (!thumbEl) continue;

            var tw = 40, th = 40;
            var sw = s.w, sh = s.h;
            if (sw <= 0 || sh <= 0) continue;
            var scale = Math.min(tw / sw, th / sh);
            var cw = Math.max(1, Math.round(sw * scale));
            var ch = Math.max(1, Math.round(sh * scale));

            var canvas = document.createElement('canvas');
            canvas.width = cw;
            canvas.height = ch;
            var ctx = canvas.getContext('2d');
            if (currentFormat === 'jpeg' || currentFormat === 'jpg') {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, cw, ch);
            }
            ctx.drawImage(rasterImageEl, s.x, s.y, s.w, s.h, 0, 0, cw, ch);
            thumbEl.innerHTML = '';
            thumbEl.appendChild(canvas);
        }
    }

    function batchDownloadSprites() {
        if (spriteRegions.length === 0) { showToast('没有精灵区域可下载'); return; }
        if (isSvg(currentFormat)) {
            for (var i = 0; i < spriteRegions.length; i++) {
                (function(idx) {
                    setTimeout(function() { downloadSpriteRegion(idx); }, idx * 300);
                })(i);
            }
            showToast('正在逐个下载 ' + spriteRegions.length + ' 个 SVG 区域...');
        } else if (rasterImageEl) {
            showProgress('正在批量导出...', 5);
            var idx = 0;
            var total = spriteRegions.length;

            (function next() {
                if (idx >= total) {
                    showProgress('完成！', 100);
                    setTimeout(hideProgress, 500);
                    showToast('已批量下载 ' + total + ' 个区域');
                    return;
                }
                var s = spriteRegions[idx];
                var canvas = document.createElement('canvas');
                canvas.width = Math.max(1, Math.round(s.w));
                canvas.height = Math.max(1, Math.round(s.h));
                var ctx = canvas.getContext('2d');
                var outFmt = currentFormat;
                if (outFmt === 'jpeg') outFmt = 'jpg';
                if (!isCanvasSupportedFormat(outFmt)) outFmt = 'png';
                if (outFmt === 'jpg') {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                ctx.drawImage(rasterImageEl, s.x, s.y, s.w, s.h, 0, 0, canvas.width, canvas.height);
                var mimeType = getMimeType(outFmt);
                var quality = (outFmt === 'jpg' || outFmt === 'webp') ? parseInt(outputQuality.value) / 100 : undefined;

                canvas.toBlob(function(blob) {
                    if (blob) {
                        var url = URL.createObjectURL(blob);
                        var link = document.createElement('a');
                        link.href = url;
                        var ext = getExt(outFmt);
                        link.download = s.name + '.' + ext;
                        document.body.appendChild(link); link.click(); document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                    }
                    idx++;
                    showProgress('导出中... (' + idx + '/' + total + ')', (idx / total) * 100);
                    setTimeout(next, 150);
                }, mimeType, quality);
            })();
        }
    }

    function updateCssOutput() {
        var cssLines = [];
        var fmtLabel = currentFormat ? currentFormat.toUpperCase() : 'IMG';
        cssLines.push('/* Sprite: ' + currentFileName + ' (' + fmtLabel + ') */');
        cssLines.push('/* Size: ' + r(vbW) + ' x ' + r(vbH) + ' */');
        cssLines.push('');
        for (var i = 0; i < spriteRegions.length; i++) {
            var s = spriteRegions[i];
            var bgPosX = -(s.x - vbX);
            var bgPosY = -(s.y - vbY);
            cssLines.push('.' + s.name + ' {');
            cssLines.push('  width: ' + r(s.w) + 'px;');
            cssLines.push('  height: ' + r(s.h) + 'px;');
            cssLines.push('  background: url(\'' + currentFileName + '\') no-repeat;');
            cssLines.push('  background-position: ' + r(bgPosX) + 'px ' + r(bgPosY) + 'px;');
            cssLines.push('  background-size: ' + r(vbW) + 'px ' + r(vbH) + 'px;');
            cssLines.push('}');
            cssLines.push('');
        }
        spriteCssOutput.textContent = cssLines.join('\n');
    }

    function downloadSpriteRegion(idx) {
        if (idx < 0 || idx >= spriteRegions.length) return;
        activeSpriteIdx = -1;
        var s = spriteRegions[idx];

        if (isSvg(currentFormat) && svgText) {
            var newSvg = buildCroppedSvg(svgText, s.x, s.y, s.w, s.h);
            var blob = new Blob([newSvg], { type: 'image/svg+xml;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = s.name + '.svg';
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('已下载: ' + s.name + '.svg');
        } else if (rasterImageEl) {
            var canvas = document.createElement('canvas');
            canvas.width = Math.max(1, Math.round(s.w));
            canvas.height = Math.max(1, Math.round(s.h));
            var ctx = canvas.getContext('2d');

            var outFmt = currentFormat;
            if (outFmt === 'jpeg') outFmt = 'jpg';
            if (!isCanvasSupportedFormat(outFmt)) outFmt = 'png';
            if (outFmt === 'jpg') {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            ctx.drawImage(rasterImageEl, s.x, s.y, s.w, s.h, 0, 0, canvas.width, canvas.height);

            var mimeType = getMimeType(outFmt);
            var quality = (outFmt === 'jpg' || outFmt === 'webp') ? parseInt(outputQuality.value) / 100 : undefined;

            canvas.toBlob(function(blob) {
                if (!blob) { showToast('导出失败'); return; }
                var url = URL.createObjectURL(blob);
                var link = document.createElement('a');
                link.href = url;
                var ext = getExt(outFmt);
                link.download = s.name + '.' + ext;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast('已下载: ' + s.name + '.' + ext);
            }, mimeType, quality);
        }
    }

    function locateSpriteRegion(idx) {
        if (idx < 0 || idx >= spriteRegions.length) return;
        activeSpriteIdx = idx;
        var s = spriteRegions[idx];
        cropXInput.value = r(s.x); cropYInput.value = r(s.y);
        cropWInput.value = r(s.w); cropHInput.value = r(s.h);
        if (cropper) {
            isUpdatingFromInput = true;
            var pixel = viewBoxToPixel(s.x, s.y, s.w, s.h);
            cropper.setData({ x: pixel.x, y: pixel.y, width: pixel.w, height: pixel.h });
            isUpdatingFromInput = false;
        }
        updateCropInfo();
        var items = spriteList.querySelectorAll('.sprite-item');
        items.forEach(function(item) { item.classList.remove('selected'); });
        var target = spriteList.querySelector('.sprite-item[data-idx="' + idx + '"]');
        if (target) target.classList.add('selected');
        document.querySelectorAll('.tab-btn')[0].click();
        showToast('已定位到: ' + s.name);
    }

    function addCustomRegion() {
        var name = document.getElementById('addName').value.trim();
        var x = parseFloat(document.getElementById('addX').value) || 0;
        var y = parseFloat(document.getElementById('addY').value) || 0;
        var w = parseFloat(document.getElementById('addW').value) || 1;
        var h = parseFloat(document.getElementById('addH').value) || 1;

        if (w <= 0 || h <= 0) { showToast('宽高必须大于 0'); return; }
        if (!name) {
            regionCounter++;
            name = 'sprite_' + String(regionCounter).padStart(2, '0');
        }

        spriteRegions.push({ name: name, x: x, y: y, w: w, h: h });
        spriteAddForm.style.display = 'none';
        renderSpriteList();
        showToast('已添加: ' + name);
    }

    function copyCssCode() {
        var text = spriteCssOutput.textContent;
        if (!text) { showToast('没有可复制的 CSS 代码'); return; }
        navigator.clipboard.writeText(text).then(function() {
            showToast('CSS 代码已复制到剪贴板！');
        }).catch(function() {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea); textarea.select();
            document.execCommand('copy'); document.body.removeChild(textarea);
            showToast('CSS 代码已复制到剪贴板！');
        });
    }

    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            if (btn.classList.contains('disabled')) return;
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
            btn.classList.add('active');
            document.getElementById('tab-' + btn.getAttribute('data-tab')).classList.add('active');
        });
    });

    fileInput.addEventListener('change', handleFileUpload);
    document.getElementById('downloadBtn').addEventListener('click', downloadCropped);
    document.getElementById('resetBtn').addEventListener('click', resetCrop);
    document.getElementById('compressBtn').addEventListener('click', compressSvg);
    document.getElementById('rasterCompressBtn').addEventListener('click', compressRaster);
    document.getElementById('multiFormatBtn').addEventListener('click', multiFormatExport);
    document.getElementById('detectSpriteBtn').addEventListener('click', detectSpriteRegions);
    document.getElementById('copyCssBtn').addEventListener('click', copyCssCode);
    document.getElementById('exportSheetBtn').addEventListener('click', exportSpriteSheet);
    document.getElementById('batchDownloadBtn').addEventListener('click', batchDownloadSprites);

    document.getElementById('downloadAllFramesBtn').addEventListener('click', function() {
        if (webpFrames.length === 0) { showToast('没有可下载的帧'); return; }
        for (var i = 0; i < webpFrames.length; i++) {
            (function(idx) {
                setTimeout(function() {
                    var a = document.createElement('a');
                    a.href = webpFrames[idx].dataUrl;
                    a.download = currentFileName.replace(/\.webp$/i, '') + '_frame_' + (idx + 1) + '.png';
                    a.click();
                }, idx * 200);
            })(i);
        }
        showToast('正在下载 ' + webpFrames.length + ' 帧...');
    });

    document.getElementById('addRegionBtn').addEventListener('click', function() {
        spriteAddForm.style.display = spriteAddForm.style.display === 'block' ? 'none' : 'block';
        if (spriteAddForm.style.display === 'block') {
            regionCounter++;
            document.getElementById('addName').value = 'sprite_' + String(regionCounter).padStart(2, '0');
            document.getElementById('addX').value = r(vbX);
            document.getElementById('addY').value = r(vbY);
            document.getElementById('addW').value = r(vbW);
            document.getElementById('addH').value = r(vbH);
        }
    });

    document.getElementById('addConfirmBtn').addEventListener('click', addCustomRegion);
    document.getElementById('addCancelBtn').addEventListener('click', function() { spriteAddForm.style.display = 'none'; });

    document.getElementById('clearAllBtn').addEventListener('click', function() {
        if (spriteRegions.length === 0) return;
        spriteRegions = [];
        regionCounter = 0;
        renderSpriteList();
        showToast('已清空所有区域');
    });
})();
</script>
</body>
</html>
